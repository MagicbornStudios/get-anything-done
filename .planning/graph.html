<script>
const GRAPH = {"nodes":[{"type":"phase","id":"phase:01","label":"Foundation","status":"done","goal":"Citty-based CJS CLI scaffold. bin/gad.cjs, defineCommand, workspace/projects commands, planning-config.toml loading, findRepoRoot."},{"type":"phase","id":"phase:02","label":"Session management","status":"done","goal":"gad session new/list/resume/close. Session JSON files in .planning/sessions/. contextMode (fresh|loaded). Session-scoped defaults for state/phases commands."},{"type":"phase","id":"phase:03","label":"Planning readers — state, roadmap, tasks","status":"done","goal":"state-reader.cjs, roadmap-reader.cjs, task-registry-reader.cjs. gad state / gad phases / gad tasks commands. XML preferred over MD. Session-scoped --projectid defaults."},{"type":"phase","id":"phase:04","label":"Extended readers — decisions, requirements, errors, blockers","status":"done","goal":"decisions-reader.cjs, requirements-reader.cjs, errors-reader.cjs, blockers-reader.cjs. Corresponding CLI commands. No-misc rule: every named field must be parseable."},{"type":"phase","id":"phase:05","label":"Docs sink pipeline","status":"done","goal":"docs-compiler.cjs: compile (.planning XML → MDX sink) and decompile (ensure .planning dirs, create stubs). gad sink compile/decompile/sync/status/validate. SOURCE_MAP, isGenerated guard, human-authored detection."},{"type":"phase","id":"phase:06","label":"Eval framework","status":"done","goal":"evals/ structure with DEFINITIONS.md, RUN.md, SCORE.md, TRACE.json. gad eval run/score/diff/trace commands. portfolio-bare template. eval-run and eval-report skills. v1–v6 CLI efficiency evals."},{"type":"phase","id":"phase:07","label":"Parser 100% coverage + tests","status":"done","goal":"parser-coverage.test.cjs: 46 tests across 6 suites. Every named XML field covered. No-misc assertion per parser. Fixed task-registry regex bugs (&lt;task\\s vs \\b, agent-id lookbehind)."},{"type":"phase","id":"phase:08","label":"Full repo planning coverage","status":"done","goal":"All vendor projects registered in planning-config.toml with .planning/ scaffold. gad refs command. plans/requirements/title fields in roadmap reader. sink sync for all 6 roots."},{"type":"phase","id":"phase:09","label":"Scoping and discoverability","status":"done","goal":"resolveRoots() helper. --all flag on all scoped commands. --projectid consistent across all commands. gad ls alias for projects list. Sink status human-authored detection."},{"type":"phase","id":"phase:10","label":"GAD eats its own dogfood + planning packs","status":"done","goal":"Register get-anything-done as a planning root. Migrate gad-* decisions into this project. Add gad pack command (bundle .planning data for repo-planner display). Update repo-planner planning-pack to consume GAD XML format."},{"type":"phase","id":"phase:11","label":"AGENTS.md and context system","status":"done","goal":"Update AGENTS.md across all vendor projects to reference XML files and gad: commands. Formalize context re-hydration flow. Validate eval scores against v6 baseline."},{"type":"phase","id":"phase:12","label":"Kill GSD, formalize GAD loop, reduce startup redundancy","status":"done","goal":"Remove all GSD artifacts (commands, hooks, settings). Add gad-17 revision (auto-compact over fresh sessions), gad-18 (canonical loop), gad-19 (GSD is dead). Simplify root AGENTS.md so agents use gad snapshot instead of reading 15 files. Rebrand useful hooks (context monitor, statusline) for GAD. Eliminate redundancy between root AGENTS.md, .planning/AGENTS.md, and vendor GAD AGENTS.md."},{"type":"phase","id":"phase:13","label":"Docs commands, skill content, DOCS-MAP rollout","status":"done","goal":"Add gad docs command. Write real content for write-intent, write-feature-doc, write-tech-doc skills. Roll out DOCS-MAP.xml to all planning roots. Production-harden CLI error paths."},{"type":"phase","id":"phase:14","label":"Eval framework: escape-the-dungeon + tracing","status":"done","goal":"Set up escape-the-dungeon eval project from GAMEPLAY-DESIGN.xml. Create eval-setup skill. Extend TRACE.json for tool_calls/skill_triggers. Define scoring rubric. Run escape-the-dungeon eval via discuss→plan→execute→verify→score flow. Tighten portfolio-bare."},{"type":"phase","id":"phase:14.5","label":"Eval findings: enforce the loop, automate tracing, auto-scaffold conventions","status":"done","goal":"Fix the 5 structural problems exposed by escape-the-dungeon eval v2: agent bootstrap with GAD context, automatic trace reconstruction from git, checkpoint enforcement for task-level tracking, auto-scaffold CONVENTIONS.md for greenfield projects, eval template AGENTS.md that enforces the loop. Re-run eval to validate fixes."},{"type":"phase","id":"phase:15","label":"GSD→GAD migration: port workflows, delete legacy","status":"done","goal":"Move workflows/, templates/, references/ out of get-shit-done/ to top-level GAD directories. Update 42 command @-path references. Delete get-shit-done/ directory (137 files). Also: copy eval game dist to docs site public dir for hosting."},{"type":"phase","id":"phase:16","label":"Sprint context window + snapshot optimization","status":"done","goal":"Add sprint concept to GAD: configurable sprint size (default 5 phases), gad sprint show/context commands. Optimize gad snapshot to fit sprint context window: collapse done phases to id|title|done, inline only active/planned phases, show only open tasks, include file refs from active tasks and recent git log. Target: snapshot fits in ~3,000 tokens (currently ~9,750). Reference: docs/context-budget.md baseline analysis, RepoPlanner sprint model (scripts/loop-cli.mjs)."},{"type":"phase","id":"phase:17","label":"Reverse-engineer skill + reader-workspace eval","status":"done","goal":"Use gad:reverse-engineer to analyze repub-builder reader workspace UI. Produce REQUIREMENTS.xml, DECISIONS.xml, CONVENTIONS.md from the existing codebase. Create reader-workspace eval project. Run eval to validate reverse-engineer → implement cycle."},{"type":"phase","id":"phase:18","label":"Eval suite — parallel runs + iteration cycle","status":"done","goal":"Run portfolio-bare + escape-the-dungeon + reader-workspace evals in parallel using gad:eval-suite. Compare results, identify patterns, tighten skills. Establish regular eval cadence. Each iteration fixes findings and adds criteria."},{"type":"phase","id":"phase:19","label":"Milestone close and v1.1 planning","status":"cancelled","goal":"Formally close gad-v1-cli milestone. Run final eval pass across all projects. Define gad-v1.1 milestone scope (domain translators, multi-agent eval, publishing pipeline, reverse-engineer refinement)."},{"type":"phase","id":"phase:20","label":"Real-time tooling, MCP bridge, and tooling evals","status":"done","goal":"Ship `gad watch planning` / `gad dev` (debounced file watch + gad refs verify + structured JSON events). Add optional MCP adapter exposing the same operations for Cursor/agents. Introduce eval_type tooling (and later mcp) with versioned TRACE.json, fixed fixtures, automated harnesses, and regression-friendly metrics. Emit machine-readable scores.json; extend report/diff for tooling runs. Increase metric granularity over time via trace_schema_version + optional metrics.json for histograms. IDE/editor integration is out of scope until explicitly re-opened."},{"type":"phase","id":"phase:21","label":"Eval framework evolution: v3 scoring, gates, preservation contract, greenfield/brownfield","status":"done","goal":"Evolve the eval framework to produce trustworthy measurements of agent workflows on creative implementation tasks. Deliver: (1) requirements versioning with v1→v2→v3 history; (2) gate criteria enforcement (game-loop, spell-crafting, UI quality); (3) composite formula v3 with human_review weight 0.30 and low-score caps; (4) preservation contract with gad eval preserve/verify commands and tests/eval-preservation.test.cjs; (5) game/.planning/ layout mandate for all eval conditions; (6) gad worktree management commands; (7) brownfield eval mode with baseline inheritance; (8) three new brownfield eval projects (etd-brownfield-gad/bare/emergent) extending bare v3. Discovered the freedom hypothesis: bare workflow consistently beats GAD on greenfield creative implementation (round 3 human scores: bare v3=0.70, emergent v2=0.50, GAD v8=0.20). Brownfield experiments are next to test whether GAD's overhead pays off on codebase extension."},{"type":"phase","id":"phase:22","label":"Portfolio experiment documentation — hub, per-project, per-run, findings, graphs","status":"cancelled","goal":"Publish all eval experiment documentation on the portfolio before further experimentation. User wants to showcase the work publicly: hub explaining methodology, per-eval-project pages with version history, per-run detail pages with scores and links to playable builds + source code, per-round experiment summaries, visualizations/graphs comparing conditions over time, requirements version history, decisions index, findings (freedom hypothesis). All compiled into apps/portfolio/content/docs/get-anything-done/evals/ via gad sink pipeline. BLOCKS round 4 and brownfield round 1 per user directive."},{"type":"phase","id":"phase:23","label":"Round 4 greenfield with v4 pressure-oriented requirements","status":"done","goal":"Run round 4 greenfield experiment with v4 requirements (pressure-oriented design, forge gate with per-floor adaptation requirement, authored dungeon with 5-8 rooms per floor and boss gates, ingenuity scoring). Three conditions: GAD, Bare, Emergent. Updated AGENTS.md for bare/emergent is minimal (only mandate .planning/ location and create_skill reference). Preserve all runs. Re-examine freedom hypothesis with new data."},{"type":"phase","id":"phase:24","label":"Round 1 brownfield — bare v3 baseline + v4 extensions","status":"cancelled","goal":"Run the first brownfield experiment. All three conditions (etd-brownfield-gad/bare/emergent) start from escape-the-dungeon-bare v3 as baseline and extend it with v4 feature requirements. Tests whether GAD's overhead pays off on codebase extension vs fresh creation. This is the experiment that could validate or refute the freedom hypothesis if GAD wins."},{"type":"phase","id":"phase:25","label":"Framework versioning workflow + trace schema overhaul","status":"done","goal":"Formalize how we ship new versions of the GAD framework itself and re-run evals across versions. Deliverables: (1) branching strategy (main = current, version/v1.1, version/v1.2 etc as frozen snapshots) so evals can pin to a framework version; (2) `gad version` command to stamp TRACE.json with the commit hash + branch it ran against; (3) trace schema v4 capturing every tool_use, skill invocation with trigger context, subagent spawn with inputs/outputs, file mutation — today's TRACE.json has a bare `skill_accuracy: 0.17` with no breakdown of WHICH skills fired and when; (4) methodology for re-running past evals against the current framework to see if framework changes affect scores; (5) new skill `framework-upgrade` documenting the upgrade + re-eval procedure. Precondition for interpreting any cross-version eval data honestly — right now we can't tell whether a score change is the agent or the framework."},{"type":"phase","id":"phase:26","label":"Research-grade visualization + Remotion video compositions","status":"done","goal":"Expand the public site from text + tables into interactive visualizations and embedded video explainers. Two tracks: (a) static SVG / React-rendered charts for score comparisons, trigger timelines, agent loops, trace breakdowns — lightweight, ship with every prebuild; (b) Remotion React compositions embedded via @remotion/player (free for teams ≤3, no MP4 export required — plays React frames live in the browser). Video topics to scope: GAD loop walkthrough, a failure-case dissection (v8 broken-crafting with tracing overlay), freedom hypothesis explanation, bare vs emergent workflow emergence comparison, per-eval \"what the agent built for itself\" retrospectives. Compositions reuse existing site React components (SiteHeader, score cards, etc) so video = composable React, no separate asset pipeline. Scaffold landed in phase 22 session 4 (registry, Player wrapper, /videos route, inline embed on per-run pages, v8 dissection placeholder). Authoring real video content blocked on phase 25 landing so we're animating honest data, not v3-era lossy aggregates."},{"type":"phase","id":"phase:27","label":"Structured objective data production for evaluations","status":"done","goal":"The eval framework's primary output is no longer \"a score per run\" — it's \"structured data that yields insights.\" Phase 27 ships the data production pipeline that makes that possible. Five tracks: (1) **Structured human review rubric** — replace the single human_review.score number with a dimensions object (playability, ui_polish, mechanics_implementation, ingenuity_requirement_met, stability, etc) and a rubric_version. Each dimension scored and annotated independently so reviewers can disagree about playability without throwing out the rest. Aggregate score is a weighted sum defined in rubric config, keeping current composite math intact. (2) **Automated gate checks** — playwright tests per eval project that boot the built game and programmatically verify G1 (game loop transitions work), G3 (UI has sprites not ASCII), G4 (pressure mechanics observable). Gate status becomes mostly objective; human reviewers only judge what playwright can't check. (3) **Derived metrics from trace events** — tool-use mix (Read vs Edit vs Bash distribution), commit rhythm (time between commits, size distribution), plan-adherence delta (PLAN.md task count vs actually-completed tasks), skill-to-tool ratio, subagent utilization. All computed from trace v4 once phase 25 ships. (4) **Cross-run aggregate queries** — SQL-like queries against the trace dataset: \"average time-to-first-commit by workflow\", \"percent of runs that triggered gad:plan-phase before writing code\", \"distribution of produced-artifact counts for bare runs\". Ships as a `gad eval query` subcommand + a /insights page on the site. (5) **Visualization patterns** — not just more charts, but a discipline: every new metric gets a chart that answers a specific research question, not just shows the number. Divergence scatter already exists; phase 27 adds tool-mix donuts, commit-rhythm timelines, rubric-dimension radar charts, trigger-timeline strips per skill. Phase 27 runs parallel to phase 25 — the rubric work can land against v3 trace data today and get richer inputs when v4 arrives."},{"type":"phase","id":"phase:28","label":"/project-market + site architecture overhaul","status":"done","goal":"Ship /project-market as the dedicated eval catalog. All eval projects listed, ETD + explainer featured. Per-project 5-round filtering. Home page lightened. Rubric on project detail pages. Site reusability review. ID format HoverCards sitewide. Gantt chart wired to planning page. Spec at .planning/specs/PROJECT-MARKET-SPEC.md. Decisions: GAD-D-116, GAD-D-119, GAD-D-124, GAD-D-125, GAD-D-130, GAD-D-131, GAD-D-134."},{"type":"phase","id":"phase:29","label":"GAD CLI build/release pipeline + operational distinction","status":"done","goal":"Official build/release pipeline for the GAD CLI. Windows binary built locally, Mac/Linux via GitHub Actions. npx install flow. Quick start guide on site. Clear messaging: GAD CLI is operational tooling for the framework, not a coding agent CLI. Decisions: GAD-D-117, GAD-D-123, GAD-D-128, GAD-D-129."},{"type":"phase","id":"phase:30","label":"Eval framework v2 — domains, tech stacks, rounds per project","status":"done","goal":"Formalize eval domain categories, tech stack metadata, build requirements, completion gates, human time estimation. Rounds per project (not global). Project → eval → round hierarchy in data model and UI. Decisions: GAD-D-88, GAD-D-90, GAD-D-110, GAD-D-111, GAD-D-113, GAD-D-114, GAD-D-121, GAD-D-132."},{"type":"phase","id":"phase:31","label":"Skill ecosystem — provenance, creation workflow, evaluation","status":"done","goal":"Skill provenance tags (installed/inherited/authored/3rd-party/gad-framework). Skill creation immediately scaffolds eval. GAD skill creator from Anthropic base. Skill inheritance CLI (done). Skill installation CLI (done). Decisions: GAD-D-100, GAD-D-102, GAD-D-107, GAD-D-112, GAD-D-120."},{"type":"phase","id":"phase:32","label":"Self-eval + trace analysis pipeline maturity","status":"done","goal":"Self-evaluation from real brownfield data displayed on site. Computed metrics append-only and long-lived. Pressure per phase drives skill creation. GAD discipline scoring for framework evals. gad self-eval CLI (done). Decisions: GAD-D-95, GAD-D-103, GAD-D-115, GAD-D-118, GAD-D-122."},{"type":"phase","id":"phase:33","label":"Reverse-engineer eval + methodology evaluation","status":"planned","goal":"Run reverse-engineer eval on grime-time and visualeditor-payloadcms targets. Methodology must be tied to buildable project with artifacts. Two-phase eval: produce requirements then build from them. Decisions: GAD-D-96, GAD-D-133."},{"type":"phase","id":"phase:34","label":"Executable release pipeline + GitHub-first distribution","status":"done","goal":"Replace the npm-first release/install story with a GitHub-first distribution model. Ship standalone executables for Windows, macOS, and Linux, with Windows as the primary authoritative local build and optional GitHub Actions builds for macOS/Linux. Document direct GitHub repo/Node install as an optional secondary path. Publish GAD skills via skills.sh / `npx skills add`. Add path-gated release rules so only shipped CLI surface changes trigger executable rebuild/release work. Decisions: GAD-D-129, GAD-D-135, GAD-D-136."},{"type":"phase","id":"phase:35","label":"Cross-runtime identity + telemetry attribution","status":"planned","goal":"Extend eval telemetry so TRACE.json and related logs record coding agent runtime identity, provenance, token/tool/skill/agent usage, and clean Claude-vs-Codex comparisons. Runtime-derived identity is the primary source; self-declared identity is secondary metadata. Claude Code and Codex are the first-class targets, with a schema extensible to additional runtimes. Decisions: GAD-D-137 and the existing trace-schema decisions."},{"type":"phase","id":"phase:36","label":"Per-eval-repo architecture + gad eval start/auto/finish + gad env","status":"planned","goal":"Restructure the eval framework around per-eval GitHub repositories. Each eval project gets its own private GitHub repo; runs live as directories (round-N/vM/) inside it. The main monorepo only stores lightweight metadata. Split gad eval run into gad eval start (scaffold + handoff), gad eval auto (autonomous via coding agent CLI), gad eval finish (preserve + push). Add gad env status / gad env agents for runtime availability checks (claude, codex, cursor-agent, gh). Remove dead skill_invocation hook code that was never wired up. Deprecate gad eval suite in favor of project-centric run-round (lands in phase 37). Decisions: GAD-D-139, GAD-D-140, GAD-D-141, GAD-D-142, GAD-D-143."},{"type":"phase","id":"phase:37","label":"gad project — top-level project lifecycle command","status":"planned","goal":"Ship gad project as a top-level CLI for real projects AND evals. Subcommands: create (scaffold AGENTS.md + .planning/ + .agents/, optional --claude --codex --cursor flags), update-requirements (trigger new round, auto-create gad+bare eval variants), install-skill (add skill to project, create injected-condition eval within current round), add-content (content-driven condition eval), run-round (execute all evals in a round, optional --runtime for autonomous). Bootstrap a project from an existing eval's round via --from-eval. Project detail page shows all possible eval variants (created or not-yet-created) so users can see the matrix status. Depends on per-eval-repo architecture (phase 36) for install-skill to know where to inject. Decisions: GAD-D-132."},{"type":"phase","id":"phase:38","label":"Skill candidates — auto-drafted from high-pressure phases, quarantined for review","status":"done","goal":"Close the loop between pressure observation and skill creation (GAD-D-115 + GAD-D-144). Extend compute-self-eval pipeline to auto-draft SKILL.md files for high-pressure phases into .agents/skills/candidates/ with status: candidate frontmatter. Drafts are quarantined — excluded from catalog scan and unavailable to GAD until promoted. Add a new \"Skill candidates\" tab on /planning with info icon HoverCard explaining what a candidate is and how it comes about. Each candidate shows: draft SKILL.md content, source phase id + title, full task list from that phase, pressure score. Reviewer actions (future): promote to real skill, merge into existing skill via merge-skill, or discard. Category on the site is \"System\" so candidates are visually distinct from canonical skills. Decisions: GAD-D-115, GAD-D-144."},{"type":"phase","id":"phase:39","label":"Site DRY pass — low-risk dedup first, then medium refactors","status":"done","goal":"Continuously reduce duplicated UI and boilerplate in vendor/get-anything-done/site without changing visitor-facing behavior. **Order:** (1) Burn down **low-risk** wins until grep finds no more trivial duplicates — identical components, copy-pasted intro blocks, dead parallel files. (2) Then **medium** refactors: shared layout shell, small compound components (e.g. section intro wrapper), shared Playable/teaser chunks. (3) Re-scan periodically after other site work. **Defer** high-friction moves (e.g. fully data-driven landing section lists) until low+medium backlog is empty. Tie-in: gad-134 (site reusability / cut duplicate edits). Depends on phase 28 (site architecture) being done."},{"type":"phase","id":"phase:41","label":"Scoped snapshots + query SDK + assignment-based workstreams","status":"done","goal":"Implement GAD's concurrency/workstream model without duplicating planning trees. Deliverables: query-oriented SDK handlers for state/tasks/scoped snapshots/assignment, CLI support for `gad snapshot --phaseid/--taskid/--agentid`, task claim/release/active commands, assignment metadata in TASK-REGISTRY.xml, and initial site/trace support for active agent lanes. This is the GAD alternative to upstream `.planning/workstreams/&lt;name&gt;/`."},{"type":"phase","id":"phase:42","label":"Evolution loop — candidate → proto-skill → skill pipeline via gad-quick-skill + advisory validator","status":"done","goal":"Ship the evolution loop as a three-stage pipeline: candidate (raw phase dump) → proto-skill (drafted SKILL.md awaiting review) → skill (promoted, part of species DNA). Stage 1: compute-self-eval.mjs writes raw skills/candidates/&lt;slug&gt;/CANDIDATE.md for every high-pressure phase. No curator pre-digestion — 2026-04-13 finding showed raw input pulls more decisions than curated. Stage 2: gad-evolution-evolve skill orchestrates: invokes gad-quick-skill (universal wrapper around dot-agent's create-skill, kept unmodified) on each candidate to write .planning/proto-skills/&lt;slug&gt;/SKILL.md, then invokes gad-evolution-validator (advisory; reads lib/evolution-validator.cjs) to write VALIDATION.md flagging file refs and CLI commands the skill cites that don't exist in the repo. Stage 3: human review reads SKILL.md + VALIDATION.md, then runs `gad evolution promote &lt;slug&gt;` or `gad evolution discard &lt;slug&gt;`. Promote moves to `skills/&lt;final&gt;/`; discard deletes. No attempt-evolution or finish-evolution skills — the loop closes itself when `.planning/proto-skills/` is empty. New evolutions gate on zero pending proto-skills. CLI subcommands: gad evolution status|install|validate|promote|discard. A deeper high-stakes path exists via gad-skill-creator (heavy wrapper around Anthropic's full skill-creator with subagent test loop + benchmark + viewer) for skills that need real test runs, but quick is the default. Deprecates lib/skill-draft.cjs and gad eval skill draft-candidates. Tie-in: skills are sections of a species' DNA, so evolving the species means evolving the skill set — this loop is the load-bearing mechanism for every framework improvement. SHIPPED 2026-04-13 (8 of 9 items from the overnight punch list; magicborn tab scoping deferred — see decision gad-158)."},{"type":"phase","id":"phase:42.1","label":"Framework comparison baseline + config consolidation + hydration metrics","status":"done","goal":"Make the framework-comparison story first-class before further marketplace/editor work. Deliverables: (1) one canonical config source (`gad-config.toml`) with automated compatibility export for `.planning/config.json`; legacy `planning-config.toml` remains fallback-only. (2) clarify the three concepts that are currently conflated: `workspace` = planning roots, `worktree` = git repo copies, `workstream` = shared-tree execution lane. Review upstream GSD workstreams against GAD's scoped-snapshot model, improve project worktree support outside evals, and port or explicitly defer worktree-health checks like upstream W017. (3) retire self-eval `loop_compliance` as the headline discipline metric; replace it with `framework_compliance` based on task skill/agent/type attribution and `hydration` metrics based on snapshot count, snapshot token volume, and hydration/total-token overhead. (4) document the framework comparison matrix as bare vs GSD vs GAD vs emergent vs custom, with Escape the Dungeon as the canonical comparison target and GAD+emergent retired as a standalone matrix condition."},{"type":"phase","id":"phase:42.2","label":"Evolution-loop follow-ups — proto-skill formalization, create-proto-skill rename, validator v2, findings whitepaper polish","status":"planned","goal":"Ship the small, coherent follow-up tasks that fell out of the phase 42 evolution-loop experiment and the phase 42.1 framework-comparison reframing. (1) Write `references/proto-skills.md` as the canonical definition of proto-skill as a permanent skill type, the candidate→proto-skill→promoted flow, the filesystem handoff contract, and the difference from `gad-skill-creator` (decision gad-167). (2) Rename `skills/gad-quick-skill/` → `skills/create-proto-skill/`, update its SKILL.md to describe the filesystem handoff input contract (CANDIDATE.md + optional CONTEXT.md + REFERENCES.md) and the batch-friendly workflow, update callers in `skills/gad-evolution-evolve/SKILL.md`, AGENTS.md, and site copy (decision gad-168). (3) Validator v2: patch `lib/evolution-validator.cjs` extractFileRefs to dedup overlapping path prefixes so a long-form path and its trailing substring are recognized as the same ref. (4) Fix the /findings/&lt;slug&gt; 404 by shipping `site/app/findings/[slug]/page.tsx` with `generateStaticParams` over FINDINGS (decision gad-169) and give the /findings index a whitepaper-framed intro. (5) Nothing here unblocks phase 43/44/45 — this phase is a cleanup/clarification pass that lets the bigger arc proceed with the vocabulary and surfaces already consistent."},{"type":"phase","id":"phase:42.3","label":"Workflows as first-class concept — mermaid-rendered expected graphs + computed actual graphs + diff","status":"planned","goal":"Make \"workflow\" a first-class GAD planning concept. Three deliverables: (1) A new planning artifact type for hand-authored workflows (format TBD — likely `.planning/workflows/*.md` with mermaid fenced block + frontmatter metadata: name, description, trigger, participants=which skills/agents are expected to appear). Author the first set covering the gad loop (snapshot→task→commit), gad decide (pros/cons→recommend→commit — the pattern validated in this conversation), gad evolution (pressure→candidate→proto-skill→validated→promoted), gad debug (symptom→hypothesis→test→root-cause→fix), gad discuss→plan→execute, gad findings authoring. (2) Trace-to-workflow synthesis — extend the existing trace-analysis pipeline (`.gad-log/` JSONL + `.trace-events.jsonl`) to emit a computed actual workflow graph for any completed phase or session, grouping tool calls, skill invocations, and agent spawns into workflow nodes. (3) `/planning` gains a Workflows tab rendering each workflow with expected (left) and actual (right) graphs side-by-side, plus a simple diff surface highlighting missing / extra / out-of-order steps. Mermaid renders client-side. Advisory only — no enforcement, no blocking. The explicit goal is to surface drift as a tuning signal: when every run deviates the same way, the expected workflow is wrong; when one run deviates, that run is worth investigating. Depends on 42.2 because the proto-skill pipeline is itself one of the first workflows we want to visualize. Leaves open: whether workflows can be nested (e.g. gad decide as a sub-workflow inside gad discuss), whether workflows carry their own validation (cf. evolution validator), and whether agents should be able to self-report \"I am executing workflow X\" as a trace signal to simplify synthesis — all deferred to the phase 42.3 discuss/plan round."},{"type":"phase","id":"phase:42.4","label":"Context framework as first-class catalog type — installable as a project dependency parallel to skills/agents/workflows/tech-stacks","status":"planned","goal":"Introduce **ContextFramework** as a new top-level catalog content type in catalog.generated.ts, sitting alongside skills, agents, commands, workflows, and tech stacks. Each framework is a **bundle referencing existing catalog items by slug** — not a copy. A project declares its framework as a dependency (same treatment as declaring a tech stack or a skill set); the Brood Editor can swap frameworks on the fly and the site recomputes the project's effective skill/agent/workflow set. **GAD stays framed as a framework** per decision gad-179 — we are not moving away from the framework identity, we are adding a playground/marketplace on top. Deliverables: (1) `ContextFramework` TS interface: id, name, description, version, skills[], agents[], workflows[], canonicalProjects[], extends? (optional parent framework slug for inheritance like \"GAD-lite extends GAD\"). (2) `.planning/context-frameworks/*.md` source files for `bare.md`, `gsd.md`, `gad.md` with YAML frontmatter listing referenced slugs. (3) `parseContextFrameworks()` in build-site-data.mjs → CONTEXT_FRAMEWORKS catalog array. (4) /context-frameworks index + /context-frameworks/[slug] detail pages framed symmetrically with /skills, /agents, /workflows. (5) Project metadata schema gains `context_framework: <slug>` field (coordinated with phase 43's species schema unification). (6) Project Market filter chip (phase 44). (7) Brood Editor \"swap framework\" action (phase 44.5). Does NOT ship the Brood Editor — just the data model so 44.5 consumes it. Related: gad-164 matrix, gad-166 GAD-is-emergent, gad-176 axis split, gad-179 catalog-type-parallel."},{"type":"phase","id":"phase:43","label":"Domain rename + project/species schema unification","status":"planned","goal":"Two changes in one atomic pass. (1) **Schema unification**: today's separate eval projects (escape-the-dungeon, escape-the-dungeon-bare, escape-the-dungeon-emergent) merge under one parent **project** (\"Escape the Dungeon\") that contains three **species** rows (gad, bare, emergent). The marketplace lists projects; project detail shows species; each species shows its generations. (2) **Domain rename**: rounds → evolutions (timeline of broods); each v1, v2… within a species → generation; all generations across species at the same round → brood; the skill manifest baked into a species → DNA; the bundle a generation produces (build + planning + trace + commits + reviews) → spawn. Touch: gad.json files (introduce `parent_project` field or merge the directory layout itself; preserve existing artifact paths to avoid breaking eval preservation), build-site-data.mjs (group by parent project, expose new types), all site components and pages (display strings, nav, hero copy), gad CLI commands and help text, AGENTS.md and the Loop docs, ROADMAP/STATE/DECISIONS prose. Single commit so we never half-rename. Display strings + types + grouping only — eval preservation paths stay stable."},{"type":"phase","id":"phase:44","label":"Project Market redesign — Unity Asset Store-style project marketplace","status":"planned","goal":"Rebuild /project-market as a real marketplace listing modeled on the Unity Asset Store: card grid with per-project cover image, species count badges (gad/bare/emergent), generation count, best human review (stars), DNA summary chip, and review excerpt. Add cardImage + tagline + heroImage fields to project metadata. For the existing 27 projects, generate placeholder gradient cards keyed to dominant species color until real images are dropped into public/projects/&lt;id&gt;.png. Faceted filter sidebar by species / domain / tech-stack. Card detail view stays at /projects/[id], showing the project's species rows with their generations nested. The marketplace should fit naturally next to a Unity Asset Store grid — same density, same affordances — because we already have the underlying data (assets, reviews via rubric scores)."},{"type":"phase","id":"phase:44.5","label":"Project Editor + Brood Editor + DNA Editor — local-dev gamified species/brood/generation workspace","status":"planned","goal":"After the marketplace lands (phase 44), build a local-dev-only Project Editor surface that contains the Brood Editor as its species-level inner surface. The editor is the operator's workspace for authoring projects, defining recipes, running species, and viewing the resulting broods of generations. Discuss-phase 2026-04-15 locked terminology + visual primitives + draft/published model in decision gad-189. Vocabulary: **Recipe** = reusable template for producing a species. **Species** = recipe attached to a concrete project. **Generation** = one concrete run of a species. **Brood** = the accumulated population of generations for a species. **Bestiary** = UI view of every species + its brood across a project. Scope: (1) **New editor route** `/projects/[id]/edit` (or `/project-editor/[id]`), dev-gated via `NODE_ENV=development`. NOT the existing `/projects/[...id]` catch-all — that remains a read-only listing detail surface. (2) **Split viewport** — left pane: bestiary grid or React Flow graph of species + broods; right pane: iframe live preview of the currently-selected generation's preserved build; bottom pane: config inspector with minecraft-style inventory grid for the species's gad.json/recipe. (3) **Visual primitives**: animated trait bars, radar chart per species (6-8 trait axes, prototype), visual diff tree with glow on changed traits between generations, minecraft inventory grid for config, in-game bestiary cards. Gamified feel comes from primitives, not a literal game engine. (4) **Visual Context System is mandatory** per decision gad-186/187 + the operator's hard requirement: every section gets an explicit `SiteSection cid=\"*-site-section\"` literal, every interactive element is grep-able, and the panel + modal-footer CRUD loop must work on every surface before the feature is considered done. No exceptions for game-styled components. (5) **Draft/published model** (decision gad-189): new `published: false` boolean on `project.json` (reserved on `species.json`). `/project-market` filters to published; `/projects/[...id]` listing detail shows both; editor shows all. (6) **Dev-server command bridge** (permissive first, allowlist hardening pass second) behind a dev-only API route. (7) **File-system adapter** for round-trip editing of `project.json`, `species.json`, `gad.json`, per-species overrides. (8) **Recipe CRUD** — operator defines recipes inside project data; running a recipe produces a generation that accumulates in the species's brood. (9) **Bestiary view** — read-only history of generations rendered as bestiary cards. (10) **Data source update for existing listing** — `project-skills-scope-section-site-section` on `/projects/[...id]` stays on the listing but its data changes from project-level skill catalog to brood/generation-aggregated skill usage. Dogfood target: `projects/project-editor/project-editor/` (scaffolded 2026-04-15 via task 44-14 with baseline species inheriting from app-forge v1). Explicit non-goals: no Vercel-hosted mutation path (decision gad-170), no sprite-based game engine, no split into separate `/project-editor` and `/species-editor` routes (the editor is one surface with inline expansion). **(11) DNA Editor pane** (decision gad-198, 2026-04-15): sibling pane alongside Bestiary showing the project's skill genome in four states — DNA (integrated into `.claude/skills/`), Expressed (`.gad-try/` sandboxes = epigenetic), Mutations (`.planning/proto-skills/` candidates), Shed pile (flagged via shed score or manual). Every row is a cid-registered SiteSection; every action row button runs a CLI command through the 44.5-02 dev bridge (`gad try`, `gad evolution promote`, `gad evolution shed`, `gad try cleanup`, copy-prompt-to-clipboard, iframe-preview trial artifacts). Built using the `scaffold-visual-context-surface` skill promoted 2026-04-15 — its first real application. Supersedes the need for a separate skill-management surface and unifies install/try/proto/shed/promote into one lifecycle view."},{"type":"phase","id":"phase:45","label":"Full site rebrand — visual identity, copy pass, hero rewrite around evolutionary model","status":"planned","goal":"The big polish pass after the rename and marketplace land. Refresh the visual identity, type ramp, color palette, hero copy, About page, README, and external-facing docs around the new species/generation/DNA/evolution language. Make the site read playfully (e.g. \"the bare species' generation 4 evolved a fitter descendant that crushed the earlier run\"). Audit every public-facing string. Includes site-wide consistency check: same word for same concept everywhere. Logo + favicon refresh if needed. Standalone phase because it's a focused design + copy effort, not a code refactor. Must drop any remaining \"GAD+emergent\" framing per decision gad-166 and treat findings as articles/whitepapers per decision gad-169."},{"type":"task","id":"task:10-01","label":"Create .planning/ scaffold for get-anything-done and register in planning-config.toml.","status":"done","goal":"Create .planning/ scaffold for get-anything-done and register in planning-config.toml.","skill":"","taskType":"","keywords":"planning,scaffold,registration"},{"type":"task","id":"task:10-02","label":"Migrate gad-01 through gad-15 decisions from root DECISIONS.xml into vendor/get-anything-done/.planning/DECISIONS.xml. A","status":"done","goal":"Migrate gad-01 through gad-15 decisions from root DECISIONS.xml into vendor/get-anything-done/.planning/DECISIONS.xml. Add gad-16 (no subagents until evaluated) and gad-17 (context handoff via planning docs).","skill":"","taskType":"","keywords":"decisions,migration,subagents,context-handoff"},{"type":"task","id":"task:10-03","label":"Add gad pack command that bundles .planning data into a repo-planner-compatible planning pack format (JSON bundle with s","status":"done","goal":"Add gad pack command that bundles .planning data into a repo-planner-compatible planning pack format (JSON bundle with state, phases, tasks, decisions, requirements, docRefs).","skill":"","taskType":"","keywords":"pack,planning-pack,repo-planner"},{"type":"task","id":"task:10-04","label":"Create vendor/get-anything-done/AGENTS.md using GAD's own workflow â€” gad CLI commands, planning loop, context re-hydra","status":"done","goal":"Create vendor/get-anything-done/AGENTS.md using GAD's own workflow â€” gad CLI commands, planning loop, context re-hydration, skill references.","skill":"","taskType":"","keywords":"agents,documentation,workflow"},{"type":"task","id":"task:10-05","label":"Create skill stubs: skills/gad-wri ag`, verify with `gh release view`. (3) First release cut: v1.33.0 or similar, with current artifacts attached. (4) Consumer-facing README section documenting the \"download installer.exe from latest release → run in target repo\" path. Gates: no GitHub Actions (operator-triggered only), no npm publishing ever, local-only build pre-commit/post-push. Must precede any B2/B3/B4 work — those sub-tasks depend on there being a consumable release.","skill":"build-and-release-locally","taskType":"framework","keywords":"release-pipeline,github-releases,node-sea,build-and-release-locally,create-skill,gh-release,postject,node24,onnxruntime"},{"type":"skill","id":"skill:build-and-release-locally","label":"build-and-release-locally","source":"task-attribution"},{"type":"task","id":"task:44-32","label":"44-28.B2 — Extend bin/install.js (5993 lines, already supports 9 coding-agent runtimes with per-runtime path rewriters) ","status":"planned","goal":"44-28.B2 — Extend bin/install.js (5993 lines, already supports 9 coding-agent runtimes with per-runtime path rewriters) with: (a) new `--site` flag that installs a self-contained site tree into `&lt;target&gt;/.planning/site/`; (b) new `--planning` flag that scaffolds `&lt;target&gt;/.planning/` with STATE.xml, ROADMAP.xml, TASK-REGISTRY.xml, DECISIONS.xml from a template; (c) new `--node` flag that opts into the portable-node bootstrap branch (44-34); (d) new `--from-release &lt;url|tag&gt;` source mode that downloads the release zip from github.com/MagicbornStudios/get-anything-done releases and extracts into a scratch dir for the installer to source files from — today install.js assumes it's running from inside the GAD repo source tree, which is wrong for a consumer that only has the installer.exe; (e) reshape interactive mode from \"pick one runtime\" to \"pick features {site, skills, planning, node}\" → then runtime picker for the skills branch; (f) gate the skills branch on `gad.exe` + node being detectable on PATH or in `.planning/.node/` — refuse install with a clear error if missing; (g) enforce the local-only install scope (no home-dir writes). Rebuild installer.exe via Node SEA, attach to the next release. Depends on 44-31 (B0) landing first so there's a release to pull from.","skill":"","taskType":"framework","keywords":"installer,install-js,site-flag,planning-flag,node-flag,from-release,skills-gating,interactive-mode"},{"type":"task","id":"task:44-33","label":"44-28.B3 — Site packaging for .planning/site/ double-click launch path. Produce a self-contained site tree: (a) Next.js ","status":"planned","goal":"44-28.B3 — Site packaging for .planning/site/ double-click launch path. Produce a self-contained site tree: (a) Next.js server build output that can run with `node server.js` in place (not `next start` which needs the full next CLI). (b) Bundled Node runtime extracted beside the site (so the launcher doesn't depend on the host having Node installed). (c) `launcher.exe` — tiny Windows exe (bun --compile or Go) that spawns `./.node/node.exe ./site/server.js`, waits for the server to bind a local port, opens the default browser at `http://localhost:&lt;port&gt;`, stays running until the browser window closes or Ctrl+C. (d) The site must read `.planning/*.xml` from its parent dir at request time — already works in dev via build-site-data.mjs but must keep working after packaging. (e) Build target + release artifact: `site-&lt;version&gt;.zip` containing site/ + .node/ + launcher.exe + README.txt. (f) Wire into 44-32's `--site` branch: installer downloads the zip from the release and extracts it to `&lt;target&gt;/.planning/site/`. Depends on 44-31 (release pipeline) + 44-32 (installer --site flag). Decision point during planning: does the packaged site rebuild its lib/catalog.generated.ts against the consumer's planning data on first launch, or does it ship with prebuilt GAD framework data baked in and only read live project data? Recommend: first-launch rebuild against consumer's gad-config.toml.","skill":"","taskType":"site","keywords":"site-packaging,launcher-exe,bundled-node,next-server,double-click,release-zip,planning-site"},{"type":"task","id":"task:44-34","label":"44-28.B4 — Portable Node bootstrap branch for the installer. When the consumer passes `--node` (or picks it in the inter","status":"planned","goal":"44-28.B4 — Portable Node bootstrap branch for the installer. When the consumer passes `--node` (or picks it in the interactive prompt), the installer (a) downloads a pinned Node zip (current LTS or whatever the site build targets) from our release assets — NOT from nodejs.org — so we own the distribution channel end-to-end; (b) extracts to `&lt;target&gt;/.planning/.node/`; (c) writes a small `.planning/.cmd/gad.cmd` (or equivalent shim) that points at `.planning/.node/node.exe` + the gad.exe location; (d) adds an instruction block in the installer's success message explaining how to activate the portable Node for this shell session. Do NOT touch the consumer's system PATH — this is a fenced install that works by being invoked through the shim. Depends on 44-31 (release pipeline must host the node zip) + 44-32 (installer --node flag wiring). Leave GitHub Actions out.","skill":"","taskType":"framework","keywords":"portable-node,node-bootstrap,installer,fenced-install,shim,cmd"},{"type":"task","id":"task:44-36","label":"Unified skill promote command — collapse `gad evolution promote` (canonical) and `gad evolution install` (runtime) into ","status":"done","goal":"Unified skill promote command — collapse `gad evolution promote` (canonical) and `gad evolution install` (runtime) into one verb with two modes. User ask 2026-04-14: \"let's move canonical skill shipping under the command skill --promote --[framework|project] so it would be a pseudo command for a project since that will just be an install to their agent runtime they would provide. for us it would be to the actual folder location in the get-anything-done and that command only works in the canonical cloned repo.\" Two modes: (a) `--framework <slug>`: move proto-skill from `.planning/proto-skills/<slug>/` to canonical `skills/<slug>/`. GATED: refuses unless running in the canonical `get-anything-done` cloned repo — detect via `git config --get remote.origin.url` matching `MagicbornStudios/get-anything-done` OR via a sentinel file like `.gad-canonical` at repo root. Same behavior as today's `gad evolution promote`. (b) `--project <slug> [--claude|--codex|--copilot|...]`: delegate to `bin/install.js`'s runtime path to install the proto-skill into the target agent's dir (.claude/skills/, .codex/skills/, etc.) with per-runtime path rewrites. Works in any consumer project. From the project's perspective their skill is now \"promoted\" (equipped), but nothing pushes upstream to canonical GAD. Shape preference (to confirm via discuss-phase): recommended entry point is a NEW top-level `gad skill` subcommand (`gad skill promote <slug> --framework` / `gad skill promote <slug> --project --claude`) with room to grow: `gad skill list`, `gad skill install`, `gad skill deprecate`. Current `gad evolution promote` becomes a thin shim that forwards to `gad skill promote --framework` for back-compat for one or two releases then removed. Update create-skill SKILL.md's \"promoting\" section to reference the new unified command. Update gad-evolution-evolve SKILL.md's step 6 (promote stable ones) to reference the new command. Keep `gad evolution install` working as-is for the moment — it can be a sibling of the new shape rather than deprecated now.","skill":"default","taskType":"cli","keywords":"skill-promote,gad-skill,framework-mode,project-mode,canonical-gate,install-js,unified-verb"},{"type":"task","id":"task:44-35","label":"Encounter-style skill surfacing in `gad snapshot`: inline the most-relevant equipped skills for the current sprint into ","status":"done","goal":"Encounter-style skill surfacing in `gad snapshot`: inline the most-relevant equipped skills for the current sprint into snapshot output so subagents (and the main session post-compact) see \"which skills apply to this encounter\" rather than having to re-discover them by trigger words. Today snapshot has no skill block at all — agents discover skills via their runtime dir (`.claude/skills/`) at session start, which misses proto-skills + doesn't weight by relevance. User framing: \"the snapshot provides the encounter / the obstacle and we use the skills we have equipped. like almost like a game and these are encounters.\" Mechanism: at snapshot time, (a) build a query string from the current sprint's open task goals + STATE.xml next-action + current-phase goal, (b) compute top-N skill relevance via cosine similarity against pre-computed skill embeddings (gad models backend already shipped, commit 9412d67) with a Jaccard token-overlap fallback when the embeddings model isn't installed, (c) include both canonical skills under `skills/` AND pending proto-skills under `.planning/proto-skills/` in the ranking — proto-skills get a \"(proto, run `gad evolution install` to equip)\" annotation so the operator can promote-on-demand, (d) emit a new `-- EQUIPPED SKILLS -- ` block in snapshot output listing top-N (configurable, default 5) entries with name + description + `:runtime-install-hint`, (e) respect the existing snapshot token budget — cap at ~500 tokens for the skills block. Edge cases: no model installed → Jaccard; no open tasks → fall back to current-phase goal; empty result → skip block. Optional flag `gad snapshot --skills=0` to disable when not wanted. This is the same \"equipped skills for the encounter\" shape we would give a subagent via a prompt, but hoisted into snapshot so it's cheap and automatic. Sibling follow-up (not in this task): a similar pass for workflows / decisions / references.","skill":"default","taskType":"cli","keywords":"snapshot,skills,embeddings,jaccard,proto-skills,relevance,encounter,subagent-hydration"},{"type":"task","id":"task:44-29","label":"Deprecate and remove PageIdentified component.","status":"done","goal":"Deprecate and remove PageIdentified component.","skill":"default","taskType":"site","keywords":"page-identified,deprecation,cleanup,visual-context,44-16-followup"},{"type":"task","id":"task:44-14","label":"Register `projects/project-editor` as an `[[evals.roots]]` entry once phase 00 of that project has produced a species/ge","status":"done","goal":"Register `projects/project-editor` as an `[[evals.roots]]` entry once phase 00 of that project has produced a species/generation shape. Today it's registered only as a `[[planning.roots]]` entry â€” project-editor is a meta-project and doesn't yet have species. When phase 01 of project-editor lands (integrating app-forge v1 as the initial species), project-editor will have at least one species and should become discoverable via `gad eval list` and /project-market alongside the other eval projects. Low effort: one toml append + a species.json stub pointing at app-forge v1 as the inherited baseline.","skill":"default","taskType":"cleanup","keywords":"eval-roots,project-editor,registration,multi-root,scaffold,baseline,inheritance"},{"type":"task","id":"task:44-15","label":"Lock the component identity pattern for the Visual Context Panel: use explicit SiteSection cid=\"...-site-section\" litera","status":"done","goal":"Lock the component identity pattern for the Visual Context Panel: use explicit SiteSection cid=\"...-site-section\" literals as the default searchable section handle, keep Identified optional for inner-block granularity, and remove duplicate in-section panel rendering so each section shows one canonical panel surface. Document the pattern and human-in-the-loop prompt handoff workflow in a reusable skill.","skill":"create-skill","taskType":"site","keywords":"visual-context-panel,site-section,cid,identifiers,human-in-the-loop,skill"},{"type":"task","id":"task:44-16","label":"Normalize remaining sections to the explicit-id pattern across the app: every user-facing SiteSection should have a stab","status":"planned","goal":"Normalize remaining sections to the explicit-id pattern across the app: every user-facing SiteSection should have a stable literal cid token and any redundant Identified wrappers that only restate the same section identity should be removed. Keep Identified only where extra inner-block targeting is materially useful for prompts.","skill":"","taskType":"site","keywords":"site-section,cid,rollout,cleanup,visual-context-panel"},{"type":"task","id":"task:44-17","label":"Write a durable reference methodology for the Visual Context Panel identity workflow so deleted/refactored sections do n","status":"done","goal":"Write a durable reference methodology for the Visual Context Panel identity workflow so deleted/refactored sections do not erase the pattern memory. Include canonical snippets, prompt-handoff shape, and planning usage rules that make skill usage explicit in TASK-REGISTRY/STATE/DECISIONS.","skill":"create-skill","taskType":"docs","keywords":"visual-context-panel,methodology,references,create-skill,planning"},{"type":"task","id":"task:44-37","label":"Retrospective: Visual Context landing band — intro landmarks vs inner showcase scope (2026-04-15). Capture where confusi","status":"done","goal":"Retrospective: Visual Context landing band — intro landmarks vs inner showcase scope (2026-04-15). Capture where confusion lived (agent prioritized showcase/meteor demos; user wanted intro kicker/title/body as separate Identified targets for DevPanel), resolution (split `LandingVisualContextIntroKicker`, `IntroTitle`, `IntroBody` under outer `LandingVisualContextShowcase`), and mitigations for future UI work (name scope explicitly; atomic Identified per DevPanel target; verify with grep before closing).","skill":"default","taskType":"meta","keywords":"retrospective,visual-context,identified,landmarks,intro,dev-panel,44-15,44-16"},{"type":"task","id":"task:44.5-01","label":"Sc f existing Visual Context System components, skills, decisions, and file paths that the Project Editor route will consume: (a) the `SiteSection cid` pattern source (site/components/...), (b) the visual-context-panel component + its modal footer CRUD form, (c) the `gad-visual-context-panel-identities` skill, (d) decisions gad-186/187, (e) how the panel participates in portal modals (decision point from phase 42 work), (f) how dev-id band scan discovers new sections, (g) the global search hook that indexes cids, (h) any missing pieces that would need to be built before the editor can meet the mandatory Visual Context coverage requirement. Produce a short reference index (not a full plan) used as the \"references\" section of 44.5-01's KICKOFF.md. This closes the user's \"make sure what references will be needed for implementation is understood\" instruction from 2026-04-15.","skill":"default","taskType":"site","keywords":"project-editor,visual-context-system,research,references,kickoff-input,clipboard-crud,cid,modal-footer"},{"type":"task","id":"task:44.5-01b","label":"Draft/published model — add `published: false` boolean to `project.json` schema (default draft) + reserve `published` on","status":"planned","goal":"Draft/published model — add `published: false` boolean to `project.json` schema (default draft) + reserve `published` on `species.json` without enforcing yet. Update `/project-market` page component to filter `FEATURED_PROJECTS` / marketplace lists to `published === true`; add a \"no published projects yet — browse drafts in the editor\" empty state with a CTA that routes to the Project Editor. Update `build-site-data.mjs` or equivalent data generator to read the new field and surface it on every project record. `/projects/[...id]` listing detail and `gad eval list` remain unfiltered per decision gad-189. Operator-facing flip is a single checkbox in the editor (44.5-01c). Schema migration: touch every existing `project.json` to add `\"published\": false` explicitly — do not rely on missing-field-means-draft, because the difference between \"not yet touched\" and \"explicitly draft\" matters for later auditing. Acceptance: `/project-market` renders the empty state with the editor CTA until at least one project flips published.","skill":"","taskType":"site","keywords":"project-editor,published,draft,project-json,marketplace-filter,schema"},{"type":"task","id":"task:44.5-01c","label":"\"Open in Editor\" CTA on the existing `/projects/[...id]` listing detail page. Adds a single button/link in the listing h","status":"done","goal":"\"Open in Editor\" CTA on the existing `/projects/[...id]` listing detail page. Adds a single button/link in the listing header that routes to the new `/projects/[id]/edit` editor surface, visible only when `NODE_ENV=development` or the dev-panel equivalent flag. Button gets its own cid. Also adds the reverse nav — an \"Exit to listing\" link in the editor shell that routes back to the listing detail for the same project. Both links participate in the visual context panel.","skill":"default","taskType":"site","keywords":"project-editor,cta,nav,cid,listing-detail"},{"type":"task","id":"task:44.5-01d","label":"Update `project-skills-scope-section-site-section` data source on the listing detail (`/projects/[...id]`). The panel st","status":"planned","goal":"Update `project-skills-scope-section-site-section` data source on the listing detail (`/projects/[...id]`). The panel stays in place but its current data source (project-level skill catalog) changes to brood/generation-aggregated skill usage pulled from the project's accumulated broods. The aggregation walks every species's generations under the project and sums skill invocations from each generation's preserved trace/attribution data. `build-site-data.mjs` gains a `projectBroodSkillAggregation` helper that produces the input record. Panel UI unchanged beyond the numbers — still source-searchable via the existing cid, still grep-able, still wired to the visual context panel. Acceptance: panel on the listing shows non-zero numbers for app-forge after aggregating app-forge v1's preserved trace, and shows zero + empty state for project-editor (baseline species inherits, no generations yet).","skill":"","taskType":"site","keywords":"project-editor,listing-detail,skills-scope,aggregation,build-site-data"},{"type":"task","id":"task:44.5-02","label":"Dev-server command bridge: Node child-process bridge behind a dev-only API route that rejects all requests unless NODE_E","status":"done","goal":"Dev-server command bridge: Node child-process bridge behind a dev-only API route that rejects all requests unless NODE_ENV=development. First cut is permissive: accepts any `gad *` and any `npx *` command so we can iterate on the editor surface without fighting the allow-list. Hardening (explicit allow-list, argument sanitization, per-command timeout tuning) is deferred to a follow-up task after the editor's happy path is proven. Stream stdout/stderr back to the browser via Server-Sent Events or similar. Explicitly rejects production requests at module load time so the wide-open dev surface can never ship in prod.","skill":"default","taskType":"site","keywords":"brood-editor,dev-bridge,security,local-dev"},{"type":"task","id":"task:44.5-02b","label":"Hardening pass for the dev-server command bridge: after 44.5-02 proves the editor works, replace the permissive \"any gad","status":"planned","goal":"Hardening pass for the dev-server command bridge: after 44.5-02 proves the editor works, replace the permissive \"any gad/npx\" acceptance with an explicit allow-list (`gad evolution status|validate|promote|discard`, `gad snapshot`, `gad state`, `gad tasks`, `npx` commands scoped to the eval repo, `pnpm|npm|yarn` install/build/test), add argument sanitization, per-command timeout tuning, and structured error responses. Keep the NODE_ENV=development gate as the primary safety â€” the allow-list is defense in depth.","skill":"","taskType":"site","keywords":"brood-editor,dev-bridge,security,hardening"},{"type":"task","id":"task:44.5-03","label":"Live-edit eval folder from the editor: file-system adapter that reads/writes requirements.md, gad.json, per-species over","status":"planned","goal":"Live-edit eval folder from the editor: file-system adapter that reads/writes requirements.md, gad.json, per-species overrides, and manifest entries for the currently-selected project, guarded by the same dev-only gate as 44.5-02. No schema validation in this task â€” focus on the round-trip (read file â†’ edit in browser â†’ write file â†’ trigger rebuild).","skill":"","taskType":"site","keywords":"brood-editor,filesystem,local-dev"},{"type":"task","id":"task:44.5-04","label":"Species/population/generation/brood capture surfaces inside the editor: inspector panes showing the currently-edited pro","status":"planned","goal":"Species/population/generation/brood capture surfaces inside the editor: inspector panes showing the currently-edited project's species rows, each species's brood (accumulated generations), and the cross-species view for the same project. Reuses phase 44 marketplace components but flips affordances from browse to \"active editing\" with visible row-level mutation indicators. Every row gets a cid. Per decision gad-189 the vocabulary is locked — inspector pane labels read \"Species\", \"Brood\", \"Generation\", \"Recipe\" and must not drift.","skill":"","taskType":"site","keywords":"brood-editor,species,generations,brood,recipe,site,cid"},{"type":"task","id":"task:44.5-05","label":"Minecraft-style inventory grid primitive for config editing. Reusable React component that renders an object (gad.json /","status":"planned","goal":"Minecraft-style inventory grid primitive for config editing. Reusable React component that renders an object (gad.json / species.json / recipe config) as a grid of slots where each slot represents one config key. Features: drag-and-drop between slots, typed slot variants (string/number/boolean/enum/nested-object → opens sub-grid), hover tooltip showing current value + source path, click-to-edit inline or modal editor for complex values, visual \"crafting\" animation when a recipe combination is recognized. Every slot has a deterministic cid derived from the config key path so slots are individually grep-able (`inventory-slot-gad-json-sprint-size-site-section`). Primary surface for 44.5-03 file-system round-trip. Prototype first in Storybook-equivalent isolation before wiring to real data.","skill":"","taskType":"site","keywords":"project-editor,inventory-grid,config-editor,primitive,gamified,cid"},{"type":"task","id":"task:44.5-06","label":"Recipe CRUD surface inside the Project Editor. Recipes are reusable species templates owned by the project (per decision","status":"planned","goal":"Recipe CRUD surface inside the Project Editor. Recipes are reusable species templates owned by the project (per decision gad-189). This task: (a) define the `recipe.json` schema — name, description, base species slug, default gad.json overrides, list of required inputs, list of expected outputs; (b) store recipes at `projects/&lt;project&gt;/&lt;project-editor-slug&gt;/recipes/&lt;recipe-slug&gt;/recipe.json` alongside species/; (c) editor UI: list of recipes in the Project Editor shell, create/edit/delete buttons (each with a cid), a form backed by the inventory-grid primitive from 44.5-05; (d) \"run recipe\" action that produces a new species in the project's species/ directory and triggers an eval generation via the command bridge; (e) a recipe-level cid so the modal footer CRUD can target recipes. No inheritance-from-recipe runtime yet — first cut is \"recipe authors a species, species runs normally\".","skill":"","taskType":"site","keywords":"project-editor,recipe,crud,schema,inventory-grid,site"},{"type":"task","id":"task:44.5-07","label":"Bestiary view — read-only UI for a project's accumulated broods. Renders as a grid of bestiary-entry cards, one per spec","status":"planned","goal":"Bestiary view — read-only UI for a project's accumulated broods. Renders as a grid of bestiary-entry cards, one per species, each card showing: species name, generation count, newest generation thumbnail, animated trait bars for the 6-8 key traits (44.5-08 dependency), click-to-expand inline panel showing all generations in the species's brood with a visual diff tree (44.5-09 dependency) highlighting which traits changed between adjacent generations. Card cids are deterministic on species slug; generation-row cids are deterministic on species+version. The bestiary is the primary left-pane in the editor's split viewport for 44.5-01. Acceptance: app-forge's bestiary shows one species (gad) with one generation (v1); project-editor's bestiary shows one species (app-forge-baseline) with its inherited-baseline badge and zero generations of its own.","skill":"","taskType":"site","keywords":"project-editor,bestiary,brood,species-detail,site,cid"},{"type":"task","id":"task:44.5-08","label":"Animated trait bar + radar chart primitives. (a) Trait bar: horizontal bar per trait, animates on mount from 0 to curren","status":"planned","goal":"Animated trait bar + radar chart primitives. (a) Trait bar: horizontal bar per trait, animates on mount from 0 to current value, color-coded by trait category, tooltip shows trait source (species.json field or derived metric). Reusable as both a standalone component and a row inside a bestiary card. (b) Radar chart: 6-8 axes showing the species's trait vector, with the ability to overlay multiple species for comparison. Prototype first — operator has not seen one yet and will give feedback after live. Both primitives get cids and a modal-footer-editable representation. Prototype in isolation before wiring to real species data.","skill":"","taskType":"site","keywords":"project-editor,trait-bar,radar-chart,primitive,animation,site"},{"type":"task","id":"task:44.5-09","label":"Visual diff tree primitive. Renders a side-by-side (or overlaid) tree view of two config objects (typically generation N","status":"planned","goal":"Visual diff tree primitive. Renders a side-by-side (or overlaid) tree view of two config objects (typically generation N vs generation N+1) where changed leaves glow with a color gradient indicating change direction (+/- for numerics, added/removed/modified for strings/objects). Used inside bestiary-card expansion (44.5-07) to surface what changed between generations in a species's brood. Every diff-row has a cid derived from the config key path for grep-ability. Accepts arbitrary JSON — schema-agnostic by design so it works for gad.json, species.json, recipe.json, and future types.","skill":"","taskType":"site","keywords":"project-editor,visual-diff,tree,generations,brood,primitive,site"},{"type":"task","id":"task:44.5-10","label":"iframe live-preview primitive for the editor's right pane. Takes a generation identifier (project/species/version) and r","status":"planned","goal":"iframe live-preview primitive for the editor's right pane. Takes a generation identifier (project/species/version) and renders the preserved static build from `apps/portfolio/public/evals/&lt;project&gt;/v&lt;N&gt;/` in a sandboxed iframe. Includes: device-frame chrome selector (desktop/tablet/mobile), reload button, \"open in new tab\" link, URL path input for SPA routes, and a fallback screenshot when the build isn't live-servable. Gets a cid. Integrates with the Visual Context System such that the modal footer can target either the iframe wrapper or (via postMessage when the inner build opts in) the selected element inside the iframe. Primary right-pane content for 44.5-01's split viewport.","skill":"","taskType":"site","keywords":"project-editor,iframe,preview,split-viewport,artifact,site,cid"},{"type":"task","id":"task:44.5-11","label":"Scaffold the DNA Editor pane inside the Project Editor left-pane region (sibling to the Bestiary pane) using the `scaffo","status":"done","goal":"Scaffold the DNA Editor pane inside the Project Editor left-pane region (sibling to the Bestiary pane) using the `scaffold-visual-context-surface` skill promoted 2026-04-15. Follow its 6-step checklist: (1) dev gate via `NODE_ENV === 'development'`, (2) enumerate panes + cid assignments (pane shell `dna-editor-pane-site-section`, four state groups `dna-editor-state-{dna,expressed,mutation,shed}-site-section`, row prototype `dna-editor-gene-&lt;slug&gt;-site-section`), (3) emit cids as literal strings (no computed cids — include a prototype literal in a comment for the row family), (4) register identities with the Visual Context Panel, (5) round-trip one modal-footer CRUD prompt against a real cid BEFORE any feature wiring, (6) only then begin list rendering / action wiring. Ships with empty state groups — the list population is 44.5-12's scope. Dev-panel badge \"DNA Editor (dev mode)\" visible. First real application of the `scaffold-visual-context-surface` skill; success criterion is that the skill's checklist guides the scaffolding without re-derivation. Per decision gad-198.","skill":"scaffold-visual-context-surface","taskType":"site","keywords":"dna-editor,project-editor,scaffold,vcs,visual-context-system,gad-198"},{"type":"task","id":"task:44.5-12","label":"DNA Editor list population — read the four gene states into the scaffolded 44.5-11 pane. **DNA**: enumerate `.claude/ski","status":"done","goal":"DNA Editor list population — read the four gene states into the scaffolded 44.5-11 pane. **DNA**: enumerate `.claude/skills/` (or the per-runtime skills dir) in the current project, read SKILL.md frontmatter for name/description/status. **Expressed**: enumerate `.gad-try/&lt;slug&gt;/` sandboxes in cwd, read PROVENANCE.md for source/kind/staged_on and ENTRY.md for the handoff prompt. **Mutations**: enumerate `.planning/proto-skills/&lt;slug&gt;/`, read PROVENANCE status + SKILL.md name + VALIDATION.md verdict. **Shed**: enumerate shed-score data (when 42.2-33 battery output is available) and manually-flagged entries. Each row renders with state-appropriate metadata badges and a cid derived from the slug (literal-prototype comment for grep-ability). No actions wired yet — pure read + render. File-system adapter extends 44.5-03's round-trip primitive. Per decision gad-198.","skill":"default","taskType":"site","keywords":"dna-editor,file-system-adapter,gene-states,project-editor,gad-198"},{"type":"task","id":"task:44.5-13","label":"DNA Editor action row wiring via the 44.5-02 dev bridge. Each gene state gets state-appropriate buttons that spawn the c","status":"done","goal":"DNA Editor action row wiring via the 44.5-02 dev bridge. Each gene state gets state-appropriate buttons that spawn the corresponding CLI command and stream output via SSE: **Try** (run `gad try &lt;ref&gt;` for a URL/slug/path input form), **Promote** (run `gad evolution promote &lt;slug&gt;` on a mutation), **Shed** (run `gad evolution shed &lt;slug&gt;` or `discard`), **Cleanup** (run `gad try cleanup &lt;slug&gt;` on an expressed trial), **Copy prompt** (read ENTRY.md + use the existing clipboard helper from 42.2-40.a), **Preview** (load the trial artifact into the right-pane iframe — 44.5-14's scope). Every button is a `SiteSection` with a deterministic cid (`dna-editor-action-&lt;verb&gt;-&lt;slug&gt;-site-section`). Depends on 44.5-11 (scaffold), 44.5-12 (list population), 44.5-02 (dev bridge). Per decision gad-198.","skill":"default","taskType":"site","keywords":"dna-editor,dev-bridge,actions,cli-spawn,project-editor,gad-198"},{"type":"task","id":"task:44.5-14","label":"Iframe preview integration for DNA Editor trial artifacts. Extends the 44.5-10 iframe live-preview primitive to detect a","status":"done","goal":"Iframe preview integration for DNA Editor trial artifacts. Extends the 44.5-10 iframe live-preview primitive to detect and render non-generation artifacts: auto-detect `graph.html` (graphify trials), generic `index.html` (codebase maps, game builds), or a SKILL.md-declared `outputs:` path. When an operator clicks Preview on an expressed trial, the right pane loads the detected artifact in the sandboxed iframe. Integrates with the Visual Context System — the iframe wrapper gets a cid derived from `&lt;slug&gt;-preview-iframe-site-section`. Falls back to a \"no viewable artifact\" placeholder when no HTML output is detected. Depends on 44.5-13 (Preview button) and 44.5-10 (iframe primitive). Per decision gad-198.","skill":"default","taskType":"site","keywords":"dna-editor,iframe,preview,artifact,trial,project-editor,gad-198"},{"type":"task","id":"task:44.5-15","label":"DNA Editor command+K shortcuts. Integrates with 42.2-43's command+K global search to add gene-lifecycle shortcuts: typin","status":"done","goal":"DNA Editor command+K shortcuts. Integrates with 42.2-43's command+K global search to add gene-lifecycle shortcuts: typing \"try &lt;ref&gt;\" triggers the same flow as the Try button; \"promote &lt;slug&gt;\" runs evolution promote; \"shed &lt;slug&gt;\" runs evolution shed; \"preview &lt;slug&gt;\" loads the trial artifact into the iframe. Autocompletes slug names from the current DNA Editor's enumerated genes. Depends on 44.5-13 (action wiring) and 42.2-43 (command+K infrastructure). Per decision gad-198.","skill":"default","taskType":"site","keywords":"dna-editor,command-k,shortcuts,search,project-editor,gad-198"},{"type":"task","id":"task:42.2-46","label":"Verb collapse documentation — write `references/skill-lifecycle.md` explaining decision gad-198's two-verb model (**expr","status":"planned","goal":"Verb collapse documentation — write `references/skill-lifecycle.md` explaining decision gad-198's two-verb model (**express** = `gad try` for epigenetic temporary expression; **integrate** = `gad evolution promote` for permanent DNA integration) against the three states (**expressed** in `.gad-try/`, **mutation** in `.planning/proto-skills/`, **integrated** in `.claude/skills/` or canonical `skills/`). Map every existing CLI command to its lifecycle role: `gad try`, `gad try cleanup`, `gad evolution install`, `gad evolution promote`, `gad evolution shed`, `gad evolution discard`, `gad skill promote-folder`, `gad install` (local), `gad install --global`. Deprecate `gad install --global` as the default first-encounter path for new skills (route new users through `gad try` + `gad evolution promote` instead). Backward compatible — no CLI changes, docs only. Update `references/skill-shape.md` §1 and AGENTS.md loop section to cite the new lifecycle model. Per decision gad-198.","skill":"","taskType":"docs","keywords":"docs,skill-lifecycle,verb-collapse,references,gad-198"},{"type":"decision","id":"decision:gad-92","label":"docs/ is GSD upstream â€” archive it, don't rewrite it","summary":"User review 2026-04-10: \"these docs do not describe gad, they describe GSD, which GAD is based off of, this is a fork of GSD.\" The docs/ directory (62 files referencing GSD across ARCHITECTURE.md, AGENTS.md, COMMANDS.md, CLI-TOOLS.md, CONFIGURATION.md, USER-GUIDE.md, FEATURES.md, context-budget.md, "},{"type":"decision","id":"decision:gad-93","label":"Agent-parallelization hypothesis â€” does multi-agent work improve outcomes or just burn tokens?","summary":"User question 2026-04-10: \"we would want to test if putting [agents] in and parallelizing the work specifically speed up development at the least, use more tokens vs less tokens if we didn't use multiple agents.\" New research hypothesis: the GSD-inherited multi-agent model (18 specialized agents wit"},{"type":"decision","id":"decision:gad-94","label":".agents/ convention extended â€” agents/ and commands/ should follow the same cross-client pattern as skills/","summary":"User observation 2026-04-10: \"if we are canonically putting skills in our .agents folder and checking in that repo, then should we not do the same for agents and commands?\" Currently: skills live at .agents/skills/ (agentskills.io convention per gad-80), agents live at agents/ (repo root), commands "},{"type":"decision","id":"decision:gad-91","label":"CLI-as-a-variable â€” GAD skills that use the CLI need the CLI installed in the eval template","summary":"User observation 2026-04-10: \"are we including the CLI in these templates. if the gad skills are using the gad cli, then that must also be used to fully implement GAD. just using GAD artifacts is one thing also, adding the CLI and snapshot is something I want to test as well.\" This is correct: sever"},{"type":"decision","id":"decision:gad-90","label":"Greenfield â†’ brownfield lineage model â€” branching visualization + same 5 hypotheses retested","summary":"User directive 2026-04-10: \"we want to show how we take the source from a greenfield and then run some brownfield evaluations on it. when we do that we want to represent that as branching like git branching or mermaid graphs.\" Formalizes the greenfield-to-brownfield relationship: (1) Every brownfiel"},{"type":"decision","id":"decision:gad-85","label":"Adopt npx skills (vercel-labs/skills) as the canonical user-facing skill installer","summary":"User directive 2026-04-09: \"find skills can just reuse the npx skill.sh and gad can really just wrap around that making the calls underneath just so gad is like a barrel for tools a user would want and we also would need.\" vercel-labs/skills (`npx skills`) is the CLI for the open agent skills ecosys"},{"type":"decision","id":"decision:gad-86","label":"Skill graduation criterion â€” no evaluation = experimental","summary":"User answer 2026-04-09 to discussion Q2: \"they become canonical if they become useful, right now skills that dont have evaluations are considered experimental. also emergent skills stay in the gad repo forever.\" Formalizes the skill lifecycle: (1) A skill with no evals/evals.json + no benchmark run "},{"type":"decision","id":"decision:gad-87","label":"Per-skill eval harness â€” GAD-native, not skill-creator's Python harnes
