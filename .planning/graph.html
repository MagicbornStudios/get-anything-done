s","summary":"User directive 2026-04-09: \"also note on the skill-creator and its eval script with python. it didnt work for gad's workflow methodology. claude gave a 4/8 tasks 2 times and I think it was testing tool calls. anyway we want to avoid that and have actionable testable frameworks.\" The anthropic skill-"},{"type":"decision","id":"decision:gad-88","label":"New eval domain â€” GUI-for-requirements-and-harness (skill-evaluation-app)","summary":"User idea 2026-04-09: \"lets make a GUI with requirements for it and put it a part of our rounds to test our theories. which I still see an emergent page, but not a hypothesis page with graphs and etc detailing it out visually.\" Two nested ideas here: (A) add more visualizations to /hypotheses, (B) c"},{"type":"skill","id":"skill:gad-explainer-video","label":"gad-explainer-video","source":"decision-citation"},{"type":"decision","id":"decision:gad-80","label":"Adopt agentskills.io standard â€” .agents/skills/ convention + cross-client interoperability","summary":"The Agent Skills standard at agentskills.io defines a client-agnostic format and discovery convention for skills: every skill is a folder containing a SKILL.md with YAML frontmatter (name + description required) and a markdown body. Progressive disclosure is a three-tier load strategy â€” catalog (n"},{"type":"decision","id":"decision:gad-81","label":"Skill count policy â€” hard cap 3-7 active per task, uniqueness enforced, collision detection required","summary":"Per the ChatGPT analysis the user shared (2026-04-09) and the agentskills.io progressive disclosure architecture, more skills does NOT equal more capability. The failure modes are: (1) context window saturation when many skills are injected or considered, (2) skill selection ambiguity when descripti"},{"type":"decision","id":"decision:gad-82","label":"Eval isolation â€” worktrees must not inherit parent monorepo skills, hooks, or settings","summary":"User concern 2026-04-09: \"a concern of mine when running the evals and rounds is that we might be polluting the experiments with our repo and monorepo installation.\" Valid concern. Eval runs currently live under `.claude/worktrees/agent-*/` spawned by `gad worktree`. Inside that worktree, the agent "},{"type":"decision","id":"decision:gad-83","label":"find-skills scope â€” installed skills in user workspace + pointer to install sources, not a global crawl","summary":"Per gad-73 the fundamental triumvirate is find-skills + merge-skill + create-skill. User clarification 2026-04-09: \"our find-skills should probably just be for installed skills and giving us suitable options to merge or to point us to installing some skills from skill.sh or the gad cli and we just i"},{"type":"decision","id":"decision:gad-84","label":"Hook-level introspection during evals â€” what \"thoughts\" can we actually capture?","summary":"User question 2026-04-09: \"what are some of the thoughts that claude or an agent is having that we can hook in to and analyze during evaluations.\" Concrete answer based on what Claude Code's hook system exposes today: (1) PreToolUse + PostToolUse hooks fire on every tool call with the tool name, arg"},{"type":"decision","id":"decision:gad-78","label":"Dogfood failure observed â€” session 2026-04-09 built GAD without using GAD","summary":"During the 2026-04-09 IA refactor session, Claude Code (the agent building the project) shipped 20+ surfaces (pages, components, prebuild extensions, decisions) without following GAD's own workflow. Specifically: (1) did not run `gad snapshot` between turns â€” ran it once early in the session and n"},{"type":"skill","id":"skill:gad-planner","label":"gad-planner","source":"decision-citation"},{"type":"skill","id":"skill:gad-phase-researcher","label":"gad-phase-researcher","source":"decision-citation"},{"type":"skill","id":"skill:gad-codebase-mapper","label":"gad-codebase-mapper","source":"decision-citation"},{"type":"decision","id":"decision:gad-79","label":"task_pressure operationalized â€” programmatic, structural, Shannon-inspired","summary":"Decision gad-75 introduced \"pressure\" as a first-class dimension but left the formula open. User answered the open question on 2026-04-09: pressure is computed PROGRAMMATICALLY from REQUIREMENTS.xml STRUCTURE, with no human override, no `<pressure-profile>` block, and no subjective scoring (ambiguit"},{"type":"decision","id":"decision:gad-75","label":"Pressure is a first-class eval dimension â€” the measurable axis connecting game-feel, requirements, and skill evolution","summary":"Introduced during the IA planning conversation on 2026-04-09: \"Pressure\" becomes a first-class evaluation dimension alongside quality, iteration count, and composite score. Working definition: pressure = the constraint intensity applied to the agent during an eval, composed of five sub-dimensions â€"},{"type":"decision","id":"decision:gad-76","label":"Target users + value-prop framing â€” researchers primary, indie devs experiential, pressure as the hook","summary":"Formal statement of who the site is for and what it says. **Primary user: coding-agent researchers** (target A) â€” people evaluating skill frameworks, hypothesis quality, and measurement rigor. They read findings, click through to DECISIONS.xml on GitHub, scrutinize the rubric construction. They to"},{"type":"skill","id":"skill:gad-value-prop-landing-page-framing","label":"gad-value-prop-landing-page-framing","source":"decision-citation"},{"type":"decision","id":"decision:gad-77","label":"Contribution flow is human-first â€” snapshot is agent-facing, not human-facing","summary":"Important clarification the user surfaced during the IA planning conversation: `gad snapshot` is a command for AGENTS to rehydrate context after compaction â€” it produces no useful output for a human reading it. A human contribution flow must NOT include running snapshot as a step. The correct huma"},{"type":"decision","id":"decision:gad-72","label":"Rounds framework â€” requirements-versioned, progressive complexity, hypothesis revisits allowed","summary":"Formal statement of the rounds framework the project has been operating under informally. (1) A round is DEFINED by a requirements-document version. New requirements version = new round. This is the unit of \"what are we testing against.\" (2) Multiple eval versions can ship inside a single round â€” "},{"type":"decision","id":"decision:gad-73","label":"Fundamental skills triumvirate â€” create-skill / merge-skill / find-skills as GAD's foundational set","summary":"User vision: GAD provides three fundamental skills that together enable the emergent-evolution hypothesis (gad-68) to work in practice. (1) **find-skills** â€” locate a trusted fundamental skill from the GAD ecosystem. Examples of fundamentals: scientific-method, debug, write-tests, profile-performa"},{"type":"decision","id":"decision:gad-74","label":"GAD's actual value proposition â€” task management at scale in-repo + skill evaluation, NOT \"ship software faster\"","summary":"User articulation: \"the main value I am seeing with GAD is not software implementation fully as products. but definitely a good task management at scale all while in repo. get-anything-done's repo and the site/data is all in repo and we encourage others to clone and contribute any experiments and bu"},{"type":"decision","id":"decision:gad-71","label":"data/ JSON pseudo-database for hand-curated site content","summary":"User proposal: \"we might want to have a pseudo database that is json some json that gets stored in the repo and we use that to collect all the static data we need for the site and operate like it is a database, just in repo as dont expect customers and sensitive information at all.\" Formalize the pa"},{"type":"decision","id":"decision:gad-68","label":"Emergent-evolution working hypothesis â€” skill-evolution + emergent projects + tailored merging","summary":"Synthesis of the freedom hypothesis (gad-36), compound-skills hypothesis (gad-65), and the consistent GAD-framework hiccups observed across rounds 1-4 into a single working hypothesis. Statement: \"A coding agent given blank planning artifacts, requirements, a task, and the ability to (a) create new "},{"type":"decision","id":"decision:gad-69","label":"Programmatic evaluation is the priority â€” minimize agent-self-report dependency","summary":"User directive: \"I don't want to be too dependent on the agents following guides/tasks to evaluate agents following guides/tasks.\" Evaluation framework must prioritize objective data produced by tooling, hooks, tracing, servers, parsing, and automation over agent self-reports, human judgment, or \"di"},{"type":"decision","id":"decision:gad-70","label":"Anthropic skills guide is the canonical reference for skill quality","summary":"The Anthropic \"Complete Guide to Building Skills for Claude\" (resources.anthropic.com/hubfs/The-Complete-Guide-to-Building-Skill-for-Claude.pdf) is adopted as the canonical reference for what a good skill looks like and how to test one. Three testing layers from the guide are named: (1) triggering t"},{"type":"decision","id":"decision:gad-01","label":"GAD is the universal planning framework â€” agent-agnostic, not Claude Code-specific","summary":"GAD (get-anything-done) is the single planning framework for all projects in this repo. Skills are methodology documents (SKILL.md) stored in vendor/get-anything-done/skills/ â€” they must work with any AI coding assistant, not just Claude Code. Claude Code-specific install paths (~/.claude/) are im"},{"type":"decision","id":"decision:gad-02","label":"Evals capture actual content, not just byte counts â€” token counts are the primary efficiency metric","summary":"Every eval RUN.md must contain verbatim CLI and raw workflow outputs, a unit-by-unit fidelity table, token counts (chars/4), arithmetic showing all formulas applied, and an agent simulation proving the next-action decision is identical with and without the CLI. Byte counts alone are insufficient bec"},{"type":"decision","id":"decision:gad-03","label":"Context = session-variable information units; static docs are exempt from CLI coverage","summary":"Context for agent resumption is defined as the 10 session-variable information units (U1â€“U10) in DEFINITIONS.md. Static docs (AGENTS.md style guide, planning model reference tables, done-task history) do not constitute context loss if absent from CLI output â€” they are read once and cached. Conte"},{"type":"decision","id":"decision:gad-04","label":"All session intents, decisions, and guidance must be captured in planning docs each session","summary":"Every working session that produces new decisions, requirements, or guidance must update DECISIONS.xml and the relevant planning docs before the session ends. Chat context is ephemeral â€” planning docs are the durable record. The GAD planning loop is the mechanism; this decision makes the capture r"},{"type":"decision","id":"decision:gad-05","label":"repo-planner is officially a GAD project; rp-* skills are deprecated","summary":"vendor/repo-planner is registered as a GAD root (id=repo-planner) in planning-config.toml. It has a GAD-format .planning/ directory. Its skills (rp-*) are deprecated stubs pointing to gad:* equivalents. The manuscript skill content migrated to vendor/get-anything-done/skills/gad-manuscript/SKILL.md."},{"type":"skill","id":"skill:gad-manuscript","label":"gad-manuscript","source":"decision-citation"},{"type":"decision","id":"decision:gad-06","label":"GAD CLI is format-agnostic: XML, MD, MDX all valid in .planning/","summary":"Sub-repos and .planning/ directories may use XML, MD, or MDX. The GAD CLI must parse all three transparently. The planning sink normalizes to MDX only. compile() converts any format to MDX; decompile() restores the original format. Coding agents and the CLI treat methodology as the constant â€” form"},{"type":"decision","id":"decision:gad-07","label":"gad-manuscript is a self-contained domain translator repo","summary":"gad-manuscript is a standalone repo that defines the domain translator pattern â€” adapts GAD base methodology to book/fiction creation. It owns its own SKILL.md files, evals, and planning docs while referencing gad:* base skills. The magicborn in-world lore content in the docs sink is produced by g"},{"type":"decision","id":"decision:gad-08","label":"GAD v1.0.0 defining characteristic: skills-first with evaluation","summary":"Pre-1.0 (GSD/ralph-wiggum loop) was workflow-heavy â€” agents followed long workflow docs. v1.0.0 is skills-first: every skill has an agent-agnostic SKILL.md definition, is evaluated for output quality, and is versioned with the methodology. The CLI provides context efficiency. Evals are scientific."},{"type":"decision","id":"decision:gad-09","label":"gad context inlines file contents by default; --refs is the lightweight mode","summary":"The `gad context` command inlines all planning file contents directly into its output by default. This gives agents a single command to get full context without reading files separately. The `--refs` flag restores the lightweight behavior (file paths only). This improves the completeness score on th"},{"type":"decision","id":"decision:gad-10","label":"gad snapshot is the one-shot full project context command","summary":"`gad snapshot` inlines every planning file in a project's .planning/ directory (excluding archive/, sessions/, node_modules/). Priority order: STATE, ROADMAP, REQUIREMENTS, DECISIONS, TASK-REGISTRY, then alphabetical. This is the canonical command for handing an agent a complete cold-start context p"},{"type":"decision","id":"decision:gad-11","label":"gad sink is the canonical docs sync command","summary":"`gad sink` owns the four-direction docs sync surface: status (diff), compile (planningâ†’docs), sync (compile all, non-destructive), decompile (ensure dirs, create stubs), validate (mapping health). Sink is manual by default â€” no auto-compile on file change. Human-authored sink files (no generated"},{"type":"decision","id":"decision:gad-12","label":"Missing-arg UX: print available choices and rerun hint, never a blind error","summary":"All GAD CLI commands that require a --projectid or --id argument must, when absent, print the list of valid choices and a ready-to-run rerun hint on stderr before exiting 1. Blind citty \"Missing required argument\" errors are banned â€” required: true is replaced with our own check."},{"type":"decision","id":"decision:gad-13","label":"TRACE.json is the machine-readable sidecar for every eval run","summary":"Every eval run directory must contain a TRACE.json alongside RUN.md and SCORE.md. TRACE.json records: workflow (A/B/both), per-command token counts and unit fidelity, unit_coverage map (U1â€“U12 at Full/Referenced/Truncated/Approximated/Absent), and computed totals. Agents write it using `gad eval t"},{"type":"decision","id":"decision:gad-14","label":"gad state and gad phases default to session project when a session is active","summary":"When no --projectid flag is given, `gad state`, `gad phases`, `gad decisions`, `gad requirements`, `gad errors`, `gad blockers`, and `gad refs` call getActiveSessionProjectId() and scope output to the active session's project. Explicit --projectid overrides. --all bypasses session scope entirely and"},{"type":"decision","id":"decision:gad-15","label":"portfolio-bare eval uses real agent sessions, not a harness â€” context_mode is self-declared","summary":"The portfolio-bare eval is a real agent session in a template directory (evals/portfolio-bare/template/) containing only planning docs and requirements â€” no app code. The agent opens the template in Claude Code or Codex, runs `gad session new [--fresh]` to declare context mode, plans phases from r"},{"type":"decision","id":"decision:gad-16","label":"GAD does not support subagents until they are formally evaluated","summary":"Spawning fresh agent instances (subagents via the Agent tool in Claude Code, or equivalent in other CLIs) is not part of the GAD workflow. Subagents start cold with no conversation history, burn context re-deriving state from files, introduce coordination overhead, and have uncharacterized failure m"},{"type":"decision","id":"decision:gad-17","label":"Context exhaustion: work through auto-compact by default, suggest restart at clean boundaries when economically motivated","summary":"**Default behavior:** never stop work mid-task, never ask the user to restart, work through Claude Code's auto-compact event. After compaction, run `gad snapshot --projectid &lt;id&gt;` to re-hydrate and continue. The planning docs (STATE.xml next-action, TASK-REGISTRY.xml, DECISIONS.xml) are what m"},{"type":"decision","id":"decision:gad-18","label":"The GAD loop is simple: snapshot â†’ work â†’ update docs â†’ commit","summary":"The canonical GAD loop for any agent, any coding tool:\r\n1. `gad snapshot --projectid &lt;id&gt;` â€” one command, full context. No reading 15 files manually.\r\n2. Pick one task from TASK-REGISTRY.xml (status=planned).\r\n3. Implement it.\r\n4. Update TASK-REGISTRY.xml (mark done), STATE.xml (next-action)"},{"type":"decision","id":"decision:gad-21","label":"Eval agents must be bootstrapped with GAD context â€” not just prompted","summary":"The escape-the-dungeon eval (v2) showed that prompting an agent to \"use gad snapshot\" and \"log traces\" doesn't work â€” the agent ignored the CLI entirely, read requirements, and coded directly. Eval agents need: (1) GAD CLI available and working in the worktree, (2) AGENTS.md in the eval template t"},{"type":"decision","id":"decision:gad-22","label":"Trace logging must be automatic â€” hooks or checkpoint-based, not manual log-cmd calls","summary":"Manual trace logging (gad eval trace log-cmd/log-skill) requires the agent to remember to call them. The v2 eval proved this doesn't happen â€” the agent backfilled all 8 skill triggers in 15 seconds at the end. Tracing should be: (1) automatic via hooks that detect gad CLI calls and skill invocatio"},{"type":"decision","id":"decision:gad-23","label":"Greenfield eval projects must auto-scaffold CONVENTIONS.md after phase 01","summary":"The escape-the-dungeon agent created 13 source files with patterns (scene structure, content pack format, state management) but documented none of them. A follow-up agent would start cold with no conventions. After the first implementation phase, GAD should prompt or auto-generate a CONVENTIONS.md f"},{"type":"skill","id":"skill:gad:map-codebase","label":"gad:map-codebase","source":"decision-citation"},{"type":"decision","id":"decision:gad-20","label":"Snapshot includes project-scoped conventions with global fallback","summary":"gad snapshot includes a CONVENTIONS section: first checks project-level CONVENTIONS.md in .planning/, then extracts conventions/style sections from the project's AGENTS.md, then falls back to global root AGENTS.md conventions. Conventions grow per-project as code/content/patterns evolve â€” refactor"},{"type":"decision","id":"decision:gad-25","label":"All GAD CLI calls and agent tool uses are logged to JSONL for eval tracing","summary":"Every gad CLI invocation logs to .planning/.gad-log/ (JSONL, one file per day): timestamp, command, args, duration, exit code. A PostToolUse hook (tool-trace.js) logs every agent tool call (Bash, Read, Write, Edit, Agent, Skill, Grep, Glob) to the same directory. During eval runs, GAD_LOG_DIR routes"},{"type":"skill","id":"skill:gad-log","label":"gad-log","source":"decision-citation"},{"type":"decision","id":"decision:gad-26","label":"Real-time GAD tooling: core first, transports second","summary":"The live developer loop (watch planning files, re-run refs verify, surface results quickly) is implemented once as a small core: debounced filesystem watch, call into existing verify code paths, emit structured events (JSON lines or NDJSON) for consumers. CLI (`gad dev` / `gad watch planning`) is th"},{"type":"decision","id":"decision:gad-27","label":"Tooling and MCP evals are automated, fixture-based, and comparable across versions","summary":"Evaluating watch/dev and MCP differs from implementation evals (agents building projects). Tooling evals use `eval_type` of `tooling` or `mcp`, a fixed `scenario` id pointing at an in-repo fixture, and an automated harness (Node script or `gad eval tooling run`) that starts the watcher or MCP client"},{"type":"decision","id":"decision:gad-28","label":"Granular eval metrics: versioned schema, summary in TRACE, detail in optional metrics.json","summary":"Automation must not depend on regex-parsing human-oriented `SCORE.md`. Implementation evals gain `scores.json` (or equivalent) alongside `SCORE.md` with stable numeric fields. Tooling evals store a summary composite (`tooling_composite` or nested `scores`) in `TRACE.json` for gates and trends; high-"},{"type":"decision","id":"decision:gad-24","label":"All skills and agents must bootstrap via gad snapshot, not manual file reads","summary":"Skills were hardcoding \"read STATE.md, ROADMAP.md, DECISIONS.md, REQUIREMENTS.md\" as Step 1 â€” 4+ file reads that the gad snapshot command already provides in one low-token output. Skills must use `gad snapshot --projectid &lt;id&gt;` as their bootstrap step. Individual CLI commands (gad tasks, gad"},{"type":"decision","id":"decision:gad-19","label":"GSD is dead â€” GAD and RepoPlanner only","summary":"All GSD (get-shit-done) skills, hooks, commands, and references are removed from the repo. GAD is the planning framework. RepoPlanner provides the planning snapshot format that GAD consumes. No GSD commands in .claude/commands/, no GSD hooks in .claude/hooks/, no GSD references in settings.json or A"},{"type":"decision","id":"decision:gad-29","label":"Process metrics do not guarantee output quality â€” human review is the ground truth","summary":"GAD v7 scored 0.81 discipline and 1.0 planning quality but only 0.30 human review (broken game loop). Bare v2 scored 0.0 discipline but 0.50 human review (most playable game). Auto-composite can be misleading â€” the 15% human_review weight is insufficient. For implementation evals that produce user"},{"type":"decision","id":"decision:gad-30","label":"Eval requirements must be versioned and findings documented per experiment","summary":"Requirements changed twice in one session (original 12 criteria â†’ gate criteria + vertical slice). Each change invalidates comparison with previous runs. Requirements must carry a version tag, and FINDINGS docs must reference which requirement version was used. Scientific rigor requires reproducib"},{"type":"decision","id":"decision:gad-41","label":"v4 game requirements reframed: pressure over features","summary":"Round 3 findings exposed that v3 was a features checklist, not a game design. Players could beat floors with default spells, forge was optional, no encounter tested adaptation. v4 flips this: every mechanic must create pressure that rewards ingenuity. Core principle: \"baseline starter abilities must"},{"type":"decision","id":"decision:gad-42","label":"Skills (physical actions) are a scored criterion, not a gate, in v4","summary":"Skills system (physical non-spell actions that evolve via own XP, can be supercharged with mana crystals) was considered for gate status but deferred. Forge is already a major gate and requiring both would cause broad-but-shallow implementations. v4 requires only that combat supports at least one no"},{"type":"decision","id":"decision:gad-43","label":"Sprite sourcing is a workflow requirement with coherent fallback allowed","summary":"v4 requires agents to attempt asset sourcing first through a defined search workflow: lightweight installable icon packs, web-searched free/open-license sprites, or common art sources. Fallback to generated/programmatic placeholders is allowed only if sourcing genuinely fails or integration cost bec"},{"type":"skill","id":"skill:gad:find-sprites","label":"gad:find-sprites","source":"decision-citation"},{"type":"decision","id":"decision:gad-44","label":"\"Traits\" in UI, narrativeStats in code â€” split terminology","summary":"Player-facing UI shows narrative/progression stats as \"Traits\". Internal code/data can continue using narrativeStats as the technical term. Both must be documented with a mapping. Prevents churn of a full taxonomy rename while giving players the more legible label."},{"type":"decision","id":"decision:gad-45","label":"Emergent AGENTS.md stops mandating specific artifacts â€” agents define their own","summary":"Round 3 emergent AGENTS.md prescribed ARCHITECTURE.md, CHANGELOG.md, specific directory layouts. That defeats the point of the emergent experiment, which is to observe what workflow artifacts an AI-decided workflow produces. v4 emergent AGENTS.md only mandates: (1) put all workflow artifacts in game"},{"type":"decision","id":"decision:gad-46","label":"Skills evolution flow: greenfield emergent â†’ brownfield emergent â†’ greenfield (installed back)","summary":"The experimental model for emergent workflows: (1) greenfield emergent creates initial skills from scratch (only has create_skill skill); (2) brownfield emergent inherits those skills + creates new ones as it extends existing code; (3) when proven, those skills can be \"installed back\" into the next "},{"type":"decision","id":"decision:gad-47","label":"Portfolio must host all experiment documentation before further experimentation","summary":"User wants to view all experiment docs on apps/portfolio: links to code, game builds, scores, process, workflows, graphs, explanations of what's being tested. The portfolio acts as the public showcase of the experiment. Before running any more eval rounds, the portfolio must contain: (1) hub page ex"},{"type":"decision","id":"decision:gad-48","label":"GAD framework diagnosis (freedom hypothesis) is deferred â€” need more eval data first","summary":"The round 3 findings showing bare consistently beats GAD on creative implementation are enough to treat as a real pattern but not yet enough to commit to structural changes (GAD-lite, pivoting away from creative evals, etc.). Before making architectural decisions about GAD itself, we need: (1) round"},{"type":"decision","id":"decision:gad-40","label":"Eval projects categorized by mode (greenfield/brownfield) and workflow (gad/bare/emergent)","summary":"Evals are now categorized on two axes: eval_mode (greenfield starts from scratch, brownfield extends an existing baseline codebase) and workflow (gad uses full framework, bare creates own workflow, emergent inherits and evolves). Stored in gad.json. Shown in gad eval list. Brownfield evals reference"},{"type":"decision","id":"decision:gad-39","label":"All eval workflow artifacts must live under game/.planning/ regardless of framework","summary":"GAD, bare, and emergent evals all must place workflow/tracking/skills/decisions/notes files under game/.planning/. Source code in src/, assets in public/, process artifacts in .planning/. This separation allows clean inspection of what methodology each eval invented without mixing it into source. Th"},{"type":"decision","id":"decision:gad-38","label":"Eval preservation is a hard contract enforced by tests","summary":"Every implementation eval run MUST end with these artifacts preserved at canonical locations: (1) evals/PROJECT/vN/TRACE.json, (2) evals/PROJECT/vN/run/ with code+planning, (3) apps/portfolio/public/evals/PROJECT/vN/ with the playable build, (4) evals/PROJECT/vN/.gad-log/ with CLI logs. The gad eval"},{"type":"skill","id":"skill:gad:eval-run","label":"gad:eval-run","source":"decision-citation"},{"type":"skill","id":"skill:gad:eval-bootstrap","label":"gad:eval-bootstrap","source":"decision-citation"},{"type":"decision","id":"decision:gad-36","label":"Freedom hypothesis: GAD constraint may correlate inversely with creative output quality","summary":"Across 3 rounds of escape-the-dungeon evals, Bare (no framework) consistently outperformed GAD (full framework) on human review. Round 3: Bare v3 = 0.70, Emergent v2 = 0.50, GAD v8 = 0.20. GAD has never exceeded 0.30 across 4 attempts; Bare is monotonically improving (0.10 â†’ 0.50 â†’ 0.70). GAD's "},{"type":"decision","id":"decision:gad-37","label":"Eval game builds must be preserved per-version, never overwritten","summary":"Previously, gad eval open copied builds to apps/portfolio/public/evals/PROJECT/index.html, overwriting previous runs. This destroyed experimental history. Now all builds are preserved at apps/portfolio/public/evals/PROJECT/VERSION/index.html. The gad eval open command checks version-specific paths f"},{"type":"decision","id":"decision:gad-32","label":"UI quality is a gate criterion at full presentation level","summary":"The build must include icons, visually differentiated room presentation, styled controls/panels, and entity visual representation. Easily installable icon/sprite packs, web-searched assets, or generated placeholders are acceptable when setup cost is low. Raw ASCII/text-only UI fails the gate. Geomet"},{"type":"decision","id":"decision:gad-33","label":"Spell crafting is a gate criterion â€” loot/rewards do not satisfy it","summary":"The player must intentionally combine runes/components through a forge/crafting interface and produce at least one new spell outcome. Pre-equipped spells or spell rewards from NPCs/loot do not count. Minimum: 3-5 runes, 3+ valid combinations, crafted spell usable in encounters."},{"type":"decision","id":"decision:gad-34","label":"Human review weight raised to 0.30 with low-score caps","summary":"human_review weight increased from 0.15 to 0.30 in composite formula. Added hard caps: if human_review &lt; 0.20, composite capped at 0.40; if &lt; 0.10, capped at 0.25. This prevents technically compliant but broken/unusable output from ranking highly. Process metrics cannot override a bad user exp"},{"type":"decision","id":"decision:gad-35","label":"Bare eval condition is a live contender, not a deprecated baseline","summary":"Bare v2 scored 0.50 human review (most playable game) versus GAD v7 at 0.30. The bare condition responds well when informed by prior failure signals, making it a valid forward-looking experimental condition. All three conditions (GAD, Bare, Emergent) remain in active testing with equal priority."},{"type":"decision","id":"decision:gad-31","label":"Inherited skills must capture failure modes and fixes, not just patterns","summary":"Emergent v1 inherited 4 skills from bare v1 but still failed (KAPLAY styled text error). The skills documented code patterns but not failure modes. Bare v2 (told about v1 failure, no inherited skills) succeeded because it had to solve the problem itself. Skills that only document \"how I did it\" with"},{"type":"decision","id":"decision:gad-49","label":"Bare and Emergent bootstrap skill set is a pinned invariant: create-skill + find-sprites","summary":"Any bare or emergent greenfield eval template MUST include skills/create-skill.md and skills/find-sprites.md in its template/skills/ directory before the eval runs. These two are the minimum bootstrap methodology an agent needs to author its own workflow (create-skill) and source coherent visual ass"},{"type":"decision","id":"decision:gad-50","label":"Trace schema v4: every tool use, skill invocation, and subagent spawn must be captured","summary":"Today's TRACE.json has a bare numeric skill_accuracy field for most runs (e.g. escape-the-dungeon v8 = 0.17 with no breakdown of which of the 6 expected triggers fired vs missed). This means we can't interpret scores across workflows. Trace schema v4 will capture: (1) every tool_use with timestamp +"},{"type":"decision","id":"decision:gad-51","label":"Framework is versioned on branches so evals can pin + re-run across versions","summary":"main = current. Frozen snapshots live on version/v1.1, version/v1.2, etc. When we ship a framework change that could affect eval scores (new skill, changed command, different subagent wiring), we branch, tag, and update a FRAMEWORK_VERSION constant used by `gad version`. Every TRACE.json stamps the "},{"type":"decision","id":"decision:gad-52","label":"Remotion is how we ship video explainers â€” player, not compiler","summary":"Remotion's @remotion/player is a React component that renders video compositions live in the browser without requiring MP4 export. Free for teams â‰¤3 and reuses existing React components (SiteHeader, score cards, SVG charts) as video frames. No separate asset pipeline â€” video IS composable React."},{"type":"decision","id":"decision:gad-53","label":"Trace schema v4 requires hook-aware agents â€” other coding agents are explicitly unsupported for tracing","summary":"Phase 25's trace schema v4 captures every tool_use, skill invocation with trigger context, and subagent spawn with inputs/outputs. The only reliable way to capture this data is from within the coding agent's runtime via hooks â€” Claude Code's PreToolUse/PostToolUse hooks, Aider's Python callbacks, "},{"type":"decision","id":"decision:gad-54","label":"Eval backfill policy: freeze old scores, stamp new runs with framework version","summary":"When the framework changes (new skill, new subagent, rewritten command), old eval scores are never recomputed. They're historical records, frozen at the framework commit they ran against. New runs against the updated framework get stamped with the new framework commit and become the \"current\" data p"},{"type":"decision","id":"decision:gad-55","label":"Multi-agent tracing is a conversion problem, not a reimplementation problem","summary":"If we ever want to evaluate Codex, Aider, or other hook-capable agents, the path is: their native session format â†’ a converter script that emits GAD trace schema v4 â†’ the same /runs/[project]/[version] page renders it. No per-agent site code. Codex's output format (Running/Ran prefixes with outp"},{"type":"decision","id":"decision:gad-56","label":"Lineage attribution: GSD â†’ RepoPlanner â†’ GAD","summary":"GAD's lineage is acknowledged explicitly on the public site. Get Shit Done (gsd-build, https://github.com/gsd-build/get-shit-done) is the upstream inspiration â€” small planning loops, visible state, executable specs. RepoPlanner (b2gdevs, https://repo-planner.vercel.app/) was an earlier attempt by "},{"type":"decision","id":"decision:gad-57","label":"Remotion parameters: 30s max, cinematic passthrough, stoppable, /videos route + inline embeds","summary":"Phase 26 parameters pinned: every composition is max 30 seconds, rendered as a cinematic passthrough (linear timeline, no branching), but the player must expose play/pause so viewers can stop mid-scroll. Videos live in two places: (1) inline \"watch this dissection\" embeds on relevant per-run pages â"},{"type":"decision","id":"decision:gad-58","label":"Skill invocation marker: hybrid file + hook-emitted event","summary":"The agent writes a single plain-text file at .planning/.trace-active-skill containing just the active skill id. That's the entire agent-side burden â€” one file write per skill start. The hook handler reads this file on every PreToolUse event to attribute subsequent tool uses to the active skill (ad"},{"type":"decision","id":"decision:gad-59","label":"Hook handler lives in the GAD repo, referenced by absolute path from user settings","summary":"The hook handler script lives at vendor/get-anything-done/bin/gad-trace-hook.cjs (or equivalent in the distributed GAD package). `gad install hooks` writes an absolute path reference into the user's ~/.claude/settings.json pointing at the installed GAD binary. This gives us one canonical handler per"},{"type":"skill","id":"skill:gad-trace-hook","label":"gad-trace-hook","source":"decision-citation"},{"type":"decision","id":"decision:gad-60","label":"Trace event output field capped at 4 KB with head/tail truncation","summary":"Individual event `outputs` fields in the JSONL stream are capped at 4096 bytes. When raw output exceeds the cap, it's split into 2 KB of head + 2 KB of tail joined by a \"... [truncated N bytes] ...\" marker, and the event is stamped with `truncated: true`. Full untruncated output remains in Claude Co"},{"type":"decision","id":"decision:gad-62","label":"Parallel eval runs share a single account rate limit â€” serial execution is the default","summary":"Round 4 attempt #1 launched GAD + Bare + Emergent in parallel via three worktree agents. All three hit an account-level rate limit simultaneously at ~14 minutes (tool_uses 81/45/40) with the message \"You've hit your limit Â· resets 12am America/Chicago\". The shared bucket meant none of the three run"},{"type":"decision","id":"decision:gad-65","label":"Compound-Skills Hypothesis â€” emergent workflow as a skill-growth framework tailored to a specific project domain","summary":"The emergent eval condition is not just \"inherit some skills and don't regress.\" It is a testable hypothesis about knowledge compounding: **as an emergent agent iterates on the same project domain across rounds, its inherited skill library should grow more specialized to that domain, and the game it"},{"type":"decision","id":"decision:gad-64","label":"API-interrupted runs are a separate failure category from rate-limited runs","summary":"Round 4's GAD v10 hit Anthropic API 529 overloaded_error twice. This is server-side transient load, not an account rate limit â€” different cause, different retry semantics, different interpretation. TRACE.json now distinguishes the two via separate flags: timing.rate_limited (account cap hit â€” ga"},{"type":"decision","id":"decision:gad-63","label":"Rate-limited runs are preserved as data points but excluded from cross-round quality comparisons","summary":"TRACE.json files from rate-limited runs are still preserved (the partial work is informative about planning differential, architecture patterns, and inheritance effects) but explicitly excluded from freedom-hypothesis comparisons, Graphs scatter plots, and cross-round score aggregation. The filter k"},{"type":"decision","id":"decision:gad-66","label":"Authored-content injection experiment â€” inherit content packs alongside requirements","summary":"New eval condition proposal: preserve every run's authored game content (spells, runes, items, NPCs, dialogue trees, skills, encounter tables) as a portable \"content pack\" separate from the source code. A subsequent eval run inherits both the requirements document AND a content pack extracted from p"},{"type":"decision","id":"decision:gad-67","label":"Serial eval execution is the permanent default â€” parallel requires explicit authorization","summary":"Reinforcement of gad-62 with a stronger default. User directive after round 4: \"our tests done sequentially to use the full token/budget that we get for these evals is more than likely what we will need to do rather than run them all in parallel most of the time. we will just need to remember to eva"},{"type":"decision","id":"decision:gad-61","label":"Research priority: structured objective data production for evaluations","summary":"The primary goal of the eval framework is no longer \"score runs\" â€” it's \"produce structured data that yields insights.\" A score is just one kind of derived data; the framework should also produce structured human review rubrics (dimensions instead of single numbers), automated gate checks (playwri"},{"type":"decision","id":"decision:gad-95","label":"GAD self-evaluation â€” real-world brownfield data from building GAD itself","summary":"Building GAD + the site IS a GAD project. We have 7 GAD workspaces in this monorepo, 2320+ tool call events across 4 days, 1000+ trace events, 93 decisions, 141 done tasks. This is real brownfield data â€” not isolated game evals. We should be scoring ourselves per \"round\" of GAD framework developme"},{"type":"decision","id":"decision:gad-96","label":"Reverse-engineer eval: requirements quality measured by build success","summary":"The reverse-engineer skill produces requirements from an existing codebase. The only way to know if those requirements are good is to build from them â€” same methodology as game evals. Eval flow: reverse-engineer a project â†’ agent builds from the generated requirements â†’ score the result agains"},{"type":"decision","id":"decision:gad-97","label":"Skills that measure GAD are framework-level, not private","summary":"trace-analysis and self-eval are public framework skills in .agents/skills/ â€” they measure GAD itself, which is useful to any GAD user. Private project-local skills (.claude/private-skills/) are reserved for truly project-specific workflow automation that has no value outside the specific repo. Sk"},{"type":"decision","id":"decision:gad-98","label":"Remove /gad:join-discord â€” dead command","summary":"The /gad:join-discord command is not useful. Remove it from the help reference and skill registry."},{"type":"skill","id":"skill:gad:join-discord","label":"gad:join-discord","source":"decision-citation"},{"type":"decision","id":"decision:gad-99","label":"Skills prefer CLI commands but use good judgment â€” methodology skills are valid","summary":"Skills should use CLI commands when they exist â€” `gad eval setup` not manual file creation. But this is judgment, not a rule. Toolless methodology skills are perfectly valid. The goal is to pack utility into the CLI and have skills leverage it, creating a cycle: CLI grows â†’ skills chain commands"},{"type":"decision","id":"decision:gad-100","label":"GAD-specific skill creator built from Anthropic's skill-creator + our artifacts/CLI","summary":"Install the Anthropic skill-creator (`npx skills add https://github.com/anthropics/skills --skill skill-creator`) and use it to create a GAD-specific derivative. The GAD skill creator knows our planning artifacts (STATE.xml, TASK-REGISTRY.xml, DECISIONS.xml), our CLI commands, our eval framework, an"},{"type":"skill","id":"skill:gad-skill-creator","label":"gad-skill-creator","source":"decision-citation"},{"type":"decision","id":"decision:gad-101","label":"gad data â€” CRUD subcommand for site/data/ and data/ JSON pseudo-database","summary":"Add `gad data list|get|set|add|remove` subcommand for CRUD operations on the JSON files in data/ (repo-level pseudo-db) and site/data/ (site-level static data). Treat it like a local database with CLI access. Examples: `gad data list` shows all collections, `gad data get hypotheses.freedom` reads a "},{"type":"decision","id":"decision:gad-102","label":"Skill creation immediately produces an eval project on the site","summary":"When a skill is created via gad:create-skill, immediately scaffold an eval project for it (`gad eval setup`) and register it on the site. GAD framework skills (skills/commands/agents related to the framework itself) must be labeled as framework-level and require formal evaluation. Non-framework skil"},{"type":"skill","id":"skill:gad:create-skill","label":"gad:create-skill","source":"decision-citation"},{"type":"decision","id":"decision:gad-103","label":"Computed trace metrics are long-lived â€” raw logs are capped","summary":"Raw trace logs (.gad-log/*.jsonl, .trace-events.jsonl) have caps (1000 events for trace, daily rotation for gad-log). But computed/mined values from those logs are long-lived static data â€” once computed, they persist in site/data/self-eval.json and don't need recomputation. The compute-self-eval p"},{"type":"decision","id":"decision:gad-104","label":"Task-skill-agent attribution is a formal tag in GAD artifacts","summary":"Every task in TASK-REGISTRY.xml should tag which skill(s) and agent(s) were involved. Format: `skill=\"skill-name\"` and `agent=\"agent-name\"` attributes on the task element. Named agents (gad-planner, gad-verifier, etc.) use their name; unnamed/default agents use \"default\". Multiple skills on one task"},{"type":"skill","id":"skill:gad-verifier","label":"gad-verifier","source":"decision-citation"},{"type":"decision","id":"decision:gad-105","label":"Enhance workflow: review task, find repetitive commands, propose script/CLI/skill","summary":"Add \"enhance\" as a workflow alongside merge. When reviewing a completed task: (1) what repetitive commands were there? (2) should we create a script and invoke that? (3) or stack commands and keep instructions? (4) or officially add to the gad CLI because it's workflow-related? This is the feedback "},{"type":"decision","id":"decision:gad-106","label":"Defer gad data CLI â€” keep it light","summary":"The gad data CRUD subcommand (gad-101) is deferred. Keep the CLI light. JSON files are readable and editable directly. Add data commands only when there's a proven workflow need, not speculatively."},{"type":"decision","id":"decision:gad-107","label":"gad eval --input for skill installation into eval projects","summary":"The eval CLI should support installing skills into eval project templates before or after runs. `gad eval run --install-skills path/to/skill [...]` installs skill(s) into the eval template, populates the data (AGENTS.md skill references, template/skills/ directory), and tracks what was installed. Th"},{"type":"decision","id":"decision:gad-108","label":"Pipeline is a formal artifact category alongside skill, agent, eval","summary":"Pipeline tasks (compute-self-eval, build-site-data, etc.) are a distinct category in our artifact tracking. The table format with Type column (skill, eval, pipeline) is the standard for listing artifacts. Pipeline tasks should be tagged in TASK-REGISTRY.xml same as skills and agents. Decoupled pipin"},{"type":"decision","id":"decision:gad-109","label":"gad data uses lowdb with /data as the managed database","summary":"The gad data CLI subcommand uses lowdb (https://github.com/typicode/lowdb) with the data/ folder as the database. JSON files in data/ are both the database AND version-controlled codebase artifacts â€” lowdb reads/writes them directly. This gives us CRUD operations via CLI while keeping the data hum"},{"type":"decision","id":"decision:gad-110","label":"Eval domain categories: game, skill, software, business, stories","summary":"Eval projects are categorized by domain â€” not just mode (greenfield/brownfield) and workflow (gad/bare/emergent). Domains: game (escape-the-dungeon, tech-stack comparisons), skill (reverse-engineer, gad-skill-creator), software (business apps, CMS templates), business (productivity tools), stories"},{"type":"decision","id":"decision:gad-111","label":"Tech stack comparison evals: same requirements, different frameworks","summary":"For game evals, compare tech stacks: Phaser, PixiJS, Three.js, Babylon.js alongside existing Kaplay/DOM builds. Same requirements, different stack in the template. The tech stack is metadata in gad.json (`tech_stack` field). Eval matrix: requirements with tech stack specified, requirements without t"},{"type":"decision","id":"decision:gad-112","label":"gad eval inherit-skills â€” CLI command to copy emergent skills from one eval into another","summary":"Easy CLI command to inherit skills from a completed eval run into a new eval template. `gad eval inherit-skills --from escape-the-dungeon-bare/v5 --to escape-the-dungeon-emergent`. This is the mechanism for testing GAD+Skills (with inheritance). The command copies skills from the source run's game/."},{"type":"decision","id":"decision:gad-113","label":"Evals have timestamps, build requirements, and completion gates","summary":"Every eval run is timestamped (started, ended) in TRACE.json. An eval is only \"done\" when: (1) the build requirement is produced (game build, requirements file, composition, running app), (2) human review is submitted. Build requirement is defined per domain in gad.json as `build_requirement` field."},{"type":"decision","id":"decision:gad-114","label":"Human time estimation vs agent time â€” comparison metric per eval","summary":"Before each eval run, the agent estimates how long the requirements would take a human developer to implement (without AI tools). This goes into TRACE.json as `human_estimate_hours`. After the run, we have actual agent duration. The ratio (estimate / actual) shows the speedup factor. This is publish"},{"type":"decision","id":"decision:gad-115","label":"Pressure per phase drives skill creation opportunities","summary":"When pressure is high on a phase (many tasks, many crosscuts per gad-75/gad-79), that signals skill creation opportunities â€” the complexity required more work, meaning patterns exist that could be captured as skills. After completing a high-pressure phase, review for: repeated commands (â†’ script"},{"type":"decision","id":"decision:gad-116","label":"Playable archive redesign for thousands of evals across domains","summary":"The Playable Archive needs redesign for scale â€” thousands of evaluations across game/skill/software/business/stories domains, with relationships between evals (e.g., reverse-engineer â†’ build-from-requirements). Non-GUI builds show their README. Multi-domain filtering. Tech stack badges. Source +"},{"type":"decision","id":"decision:gad-117","label":"Quick start guide + simplified install â€” no repo clone required","summary":"GAD needs a quick start guide for onboarding: install Claude Code or Codex CLI, install GAD (`npx get-anything-done`), run first eval. No repo clone required for users â€” the eval framework should work from any project. Documentation priority: quick start, eval setup guide, skill creation guide, CL"},{"type":"decision","id":"decision:gad-118","label":"GAD discipline scoring for evals using the framework","summary":"Evals running with the GAD workflow should compute GAD discipline scores from their traces â€” same metrics as self-eval (overhead ratio, loop compliance, planning doc freshness, decision capture rate). These scores live in the eval's TRACE.json and are displayed on the run detail page. The eval's s"},{"type":"decision","id":"decision:gad-119","label":"Interactive Gantt chart for phases and rounds with hover stats","summary":"Replace or augment the current phase/round displays with interactive Gantt charts. Phases as horizontal bars on a timeline. Click a phase to expand tasks. Hover for stats (pressure score, token count, task count, duration). Same pattern for RoundResults â€” Gantt chart of rounds, click shows results"},{"type":"decision","id":"decision:gad-120","label":"Skill provenance tags: installed, inherited, authored, 3rd-party, gad-framework","summary":"Skills in an eval run have provenance: (1) installed â€” put in template via --install-skills before the run, (2) inherited â€” copied from a prior run via inherit-skills, (3) authored â€” created by the agent during the run (didn't exist at start), (4) 3rd-party â€” from external sources (npx skill"},{"type":"skill","id":"skill:gad-framework","label":"gad-framework","source":"decision-citation"},{"type":"decision","id":"decision:gad-121","label":"Rounds are per-project, defined by requirements version changes","summary":"A \"round\" for a project is defined when its requirements document changes version. Each eval project has its own round timeline, not a single global round number. The current global rounds (1-5) are specific to the escape-the-dungeon family. Other projects (reverse-engineer, skill-evaluation-app, et"},{"type":"decision","id":"decision:gad-122","label":"gad self-eval CLI command for pressure and framework metrics","summary":"Add `gad self-eval` CLI command that runs the compute-self-eval pipeline and prints findings. Pipeline scripts should have corresponding CLI commands so agents and users can invoke them. `gad self-eval` runs compute-self-eval.mjs and outputs: pressure per phase, overhead ratio, loop compliance, high"},{"type":"decision","id":"decision:gad-123","label":"Docs must be on the site â€” docs/ markdown files need site routes","summary":"Documentation in docs/ (quick-start.md, eval-guide.md) must be rendered as routes on the site, not just exist as markdown files in the repo. The site is the primary documentation surface. Docs routes: /quickstart, /eval-guide. These should be built from the markdown files during prebuild, same as ot"},{"type":"decision","id":"decision:gad-124","label":"Playable archive becomes a dedicated /evals page â€” catalog/marketplace pattern","summary":"The current playable archive on the landing page works for showing the last 5 rounds of game builds. But we need a dedicated /evals page that shows ALL evals across ALL rounds as a catalog/marketplace. Filter by domain, tech stack, round, workflow, review status. Show build size + source size. Show "},{"type":"decision","id":"decision:gad-125","label":"ID format: per-project namespace + type prefix + number","summary":"IDs encode project, artifact type, and number. Format: PROJECT-TYPE-NUMBER. Examples: GAD-D-119 (GAD decision 119), GAD-T-22-01 (GAD task phase 22 task 01), GAD-P-22 (GAD phase 22), ETD-T-3-01 (escape-the-dungeon task). Type codes: D=decision, T=task, P=phase, R=requirement, B=bug, S=skill. Namespac"},{"type":"decision","id":"decision:gad-128","label":"GAD CLI is an operational CLI â€” distinct from coding agent CLIs","summary":"The GAD CLI (gad) is an operational CLI for the GAD framework and ecosystem. It is NOT a coding agent CLI like Claude Code CLI or Codex CLI. Those are coding agent runtimes. GAD provides commands, agents, skills, and artifacts FOR those coding agent CLIs. The site must make this distinction clear â€"},{"type":"decision","id":"decision:gad-129","label":"Official build/release pipeline for GAD CLI â€” Windows first, publish ourselves","summary":"Ship an official build/release pipeline for the GAD CLI. Windows first (build on this machine, publish ourselves). Mac and Linux can use GitHub workflows. Users install via npx get-anything-done or a published binary. The CLI should let users set up blank projects or eval projects. The /quickstart f"},{"type":"decision","id":"decision:gad-130","label":"/project-market â€” dedicated catalog page for all eval projects","summary":"Ship /project-market as the dedicated catalog page listing ALL eval projects (not just ETD + explainer). ETD and explainer are featured/canonical (pinned, badged) but not exclusive. Default filter: last 5 rounds per project (not global). Home page playable archive shrinks to a teaser linking to /pro"},{"type":"decision","id":"decision:gad-131","label":"Rubric belongs on project detail and eval pages, not standalone /rubric","summary":"The /rubric page content should live on project detail pages and eval run pages where it's contextual. A standalone /rubric page may remain as a methodology reference but the primary rubric experience is per-project and per-run."},{"type":"decision","id":"decision:gad-132","label":"Projects have evals, evals have rounds, rounds triggered by requirements changes","summary":"Conceptual hierarchy: Project â†’ eval projects â†’ rounds. A round is triggered when requirements change. Within a round, requirements can iterate without triggering a new round until new evals branch or the contract fundamentally changes. Per-project round windows for display filtering."},{"type":"decision","id":"decision:gad-133","label":"Methodology must be tied to a buildable project with artifacts","summary":"Even methodology-only tracks must implement a buildable project. No catalog entry without a concrete eval project and evaluation path. If methodology produces signals (pressure, compliance, traces), artifacts must ship. GAD-on-GAD is the reference. Vibes-only theory is not a catalog entry."},{"type":"decision","id":"decision:gad-134","label":"Site reusability review needed â€” cut down on duplicate edits","summary":"The site needs a reusability pass: shared patterns reimplemented across pages, duplicate components, data shape changes requiring edits everywhere. Pipeline-generated data should drive generic components. Queued for future session."},{"type":"decision","id":"decision:gad-135","label":"GAD distribution is GitHub-first: executable releases + skills.sh, not npm publish","summary":"GAD should not rely on public npm publication as the primary distribution path. The official install story is: (1) download a GitHub Release executable for the gad operational CLI, and (2) install the published GAD skills from the GitHub repo via skills.sh / `npx skills add`. Users who already have "},{"type":"decision","id":"decision:gad-136","label":"Executable release overhead is gated to shipped CLI surface changes only","summary":"Building and publishing new GAD executables should happen only when the shipped CLI surface changes. Triggering inputs include changes under bin/, lib/, hooks/, package.json, build/release scripts, or any file bundled into the released artifact. Site content, eval results, planning docs, starters, a"},{"type":"decision","id":"decision:gad-137","label":"Runtime identity in eval telemetry is runtime-derived first, self-declared second","summary":"Eval telemetry must distinguish the coding agent runtime that produced a run: Claude Code, Codex, Cursor, and future supported agents. The preferred source is runtime-derived metadata from hooks, config, or environment. A secondary self-declared identity may be recorded by the agent at task/session "},{"type":"decision","id":"decision:gad-138","label":"Standalone gad executables use Node SEA with an injected support payload","summary":"The executable distribution for gad is implemented as a standalone binary built with Node SEA and postject. The binary embeds a packaged support payload containing the CLI bundle, installer entrypoint, hooks, commands, templates, workflows, references, agents, and skills. On first run, the executabl"},{"type":"decision","id":"decision:gad-139","label":"Per-eval-repo architecture â€” one GitHub repo per eval project, directories for runs","summary":"Each eval project (e.g. escape-the-dungeon-bare) gets its own GitHub repository (private initially). Runs live as directories inside the repo: round-N/vM/. The main monorepo only holds eval metadata (gad.json + lightweight TRACE.json reference), not the actual source/build artifacts. This prevents t"},{"type":"decision","id":"decision:gad-140","label":"gad eval run â†’ start / auto / finish â€” explicit command split","summary":"The existing gad eval run command conflates scaffolding with execution. Split into three commands: gad eval start (scaffold run dir, create eval repo clone if needed, generate PROMPT.md + TRACE.json, hand off to external agent â€” matches current \"run --execute\" behavior), gad eval auto (scaffold TH"},{"type":"decision","id":"decision:gad-141","label":"gad eval suite replaced by gad project run-round","summary":"The batch eval runner is now project-centric. Instead of gad eval suite (which operates on arbitrary eval project lists), use gad project run-round --projectid &lt;id&gt; --roundnumber &lt;N&gt; [--runtime codex|claude|cursor] which executes all eval variants in the specified round for the specified"},{"type":"decision","id":"decision:gad-142","label":"Skill/agent tracking is GAD-workflow-only, not universal","summary":"The skill and agent attributes on TASK-REGISTRY.xml tasks (decision GAD-D-104) only apply when the agent is using the full GAD workflow. Bare and emergent conditions have minimal or agent-defined planning artifacts â€” forcing skill tracking on them would contaminate the Freedom/CSH hypothesis measu"},{"type":"decision","id":"decision:gad-143","label":"gad env status / gad env agents â€” runtime availability checks","summary":"Before any eval operation (start/auto/finish), the CLI must verify that required runtimes are available. gad env status prints a table of: Claude Code CLI (claude), Codex CLI (codex), Cursor Agent (cursor-agent), GitHub CLI (gh) + auth status, Node version, git version. Missing tools show install li"},{"type":"decision","id":"decision:gad-144","label":"Skill candidates â€” auto-author draft skills from high-pressure phases, quarantine for review","summary":"When the self-eval pipeline flags a phase as high-pressure (task count + crosscuts above threshold), that's a signal patterns exist that could become skills (per GAD-D-115). Rather than just logging the flag, the pipeline should auto-generate draft SKILL.md files inspired by the phase's tasks and pa"},{"type":"decision","id":"decision:gad-145","label":"Candidate review lifecycle + configurable pressure formula + Shannon framing","summary":"Three fixes layered on phase 38 candidate generation. (1) Candidate review lifecycle: each candidate SKILL.md gets a reviewed frontmatter field (default false). A human sets reviewed to promoted, merged, or discarded with reviewed_on and reviewed_notes. The pipeline skips any candidate whose reviewe"},{"type":"decision","id":"decision:gad-146","label":"Claude-facing model profiles stay off by default and use runtime-safe aliases when enabled","summary":"Model profiles were present in prompts and references but had drifted out of the live workflow: gad-tools init no longer emitted the resolved model fields, the SDK default still assumed an always-on profile in some places, and the SDK path used a stale frozen Haiku model ID that failed at runtime. P"},{"type":"skill","id":"skill:gad-tools","label":"gad-tools","source":"decision-citation"},{"type":"decision","id":"decision:gad-147","label":"GAD workstreams are scoped execution contexts over shared planning artifacts, not duplicated planning trees","summary":"After reviewing upstream get-shit-done workstreams, GAD adopts a different direction. The concurrency problem is real, but duplicating `STATE`, `ROADMAP`, `REQUIREMENTS`, and `phases/` under `.planning/workstreams/&lt;name&gt;/` is not the right fit for GAD's eval, tracing, and site-reporting model."},{"type":"skill","id":"skill:gad:workstreams","label":"gad:workstreams","source":"decision-citation"},{"type":"decision","id":"decision:gad-148","label":"Query-oriented SDK is the canonical planning logic core; CLI remains the canonical operator surface","summary":"GAD keeps a CLI-first operator model for skills and humans, but the framework should stop treating subprocess calls to `gad-tools` as the hidden source of truth for planning operations. The canonical logic layer should be a query-oriented SDK surface (`sdk/src/query/...`) that exposes typed in-proce"},{"type":"decision","id":"decision:gad-149","label":"gad snapshot is the normal agent-lane bootstrap handshake","summary":"Concurrent GAD agents should not need a separate mandatory registration command before they can work. `gad snapshot` is both the context loader and the identity/bootstrap handshake. When snapshot is called with runtime/role/parent/task/phase context, or when a known runtime is detected, it auto-regi"},{"type":"skill","id":"skill:gad-agent-lanes","label":"gad-agent-lanes","source":"decision-citation"},{"type":"decision","id":"decision:gad-150","label":"Agent lane depth is capped at one direct child level","summary":"GAD adopts a hard concurrency depth limit of `1`. Root agents may spawn direct child lanes, but child lanes may not spawn additional children. This preserves the single-master-loop model, prevents recursive agent explosion, keeps trace lineage understandable, and avoids hidden token burn from swarm-"},{"type":"decision","id":"decision:gad-151","label":"Evolutionary domain vocabulary â€” species, generation, brood, evolution, DNA, spawn","summary":"The GAD eval domain adopts a single locked evolutionary vocabulary. A **species** is a workflow lineage inside a project (bare, gad, emergent). A **generation** is one versioned run within a species (v1, v2â€¦). A **brood** is all generations across species at the same round. An **evolution** is the"},{"type":"decision","id":"decision:gad-152","label":"Two-stage evolution pipeline â€” candidate â†’ proto-skill â†’ skill","summary":"Skill creation flows through three distinct stages, each in its own directory. **Candidate** (skills/candidates/&lt;slug&gt;/CANDIDATE.md) is the raw phase dump produced by compute-self-eval when a phase exceeds the selection pressure threshold â€” no curator pre-digestion, just task list + decision"},{"type":"skill","id":"skill:gad-quick-skill","label":"gad-quick-skill","source":"decision-citation"},{"type":"skill","id":"skill:gad-evolution-validator","label":"gad-evolution-validator","source":"decision-citation"},{"type":"decision","id":"decision:gad-153","label":"Raw candidate input beats curated INTENT â€” the curator is a filter, not an amplifier","summary":"Two controlled experiments on 2026-04-13 compared feeding raw phase data vs a hand-curated structured INTENT.md to skill drafting tools. Result flipped between heavy (Anthropic skill-creator) and light (dot-agent create-skill) drafters: with the light tool, the RAW arm pulled 16 decisions vs the cur"},{"type":"decision","id":"decision:gad-154","label":"Two-tier skill creators â€” gad-quick-skill (default) and gad-skill-creator (high-stakes)","summary":"GAD maintains two drafting wrappers with different trade-offs. **gad-quick-skill** wraps dot-agent's create-skill (https://github.com/siviter-xyz/dot-agent) unmodified â€” a lightweight authoring guide with the 200-line rule, progressive disclosure principle, and references/ split. No eval loop, no "},{"type":"decision","id":"decision:gad-155","label":"Validator is advisory, not blocking â€” failures flag, human decides","summary":"The gad-evolution-validator skill and its engine (lib/evolution-validator.cjs) check proto-skill SKILL.md files for cited file references that don't exist in the repo and cited `gad &lt;subcommand&gt;` commands that don't appear in `gad --help`. Output lands in VALIDATION.md alongside the SKILL.md w"},{"type":"decision","id":"decision:gad-156","label":"New evolutions gate on zero pending proto-skills (the human review gate)","summary":"gad-evolution-evolve refuses to start a new evolution if .planning/proto-skills/ contains any pending proto-skills from a previous evolution. Rationale: evolutions accumulating without review just rot â€” if candidates stack up faster than humans review them, the whole loop becomes noise. The gate f"},{"type":"decision","id":"decision:gad-157","label":"System nav group uses four submenus â€” Internals, Catalog, Reference, Engage","summary":"The System dropdown got too heavy (11 items in one flat list). It is now refactored into four subcategories rendered via Radix DropdownMenuSub: **Internals** (Planning, Requirements, Local DB), **Catalog** (Skills, Agents, Commands, Downloads), **Reference** (Lineage, Standards, Findings), **Engage*"},{"type":"decision","id":"decision:gad-158","label":"Phase 45 rebrand is confirmed direction â€” full visual + copy overhaul around evolutionary vocabulary","summary":"After the domain rename (phase 43) and marketplace redesign (phase 44) land, the site gets a dedicated visual + copy pass (phase 45) that re-anchors the brand around the evolutionary vocabulary (decision gad-151). This is not a parked \"maybe someday\" â€” the user explicitly confirmed \"branding is ch"},{"type":"decision","id":"decision:gad-159","label":"Magicborn per-project nav scoping is a pending design decision (phase 42 item 9)","summary":"Magicborn needs the GAD site compile path to produce a pared-down nav: /planning as the home page, System tab kept, Catalog items merged into System, and the Evaluation / Theory / Play / Emergent / Skeptic tabs all dropped. During the phase 42 overnight push this was deferred because implementing it"},{"type":"skill","id":"skill:gad-config","label":"gad-config","source":"decision-citation"},{"type":"decision","id":"decision:gad-160","label":"`gad-config.toml` is the only canonical config; legacy config formats are compatibility layers","summary":"GAD should not ask operators to reason about multiple source-of-truth config files. `gad-config.toml` is the canonical configuration file going forward. `planning-config.toml` remains read-only fallback for older repos and migration periods, but new writes target `gad-config.toml` only. `.planning/c"},{"type":"decision","id":"decision:gad-161","label":"`workspace`, `worktree`, and `workstream` are different concepts and must stay distinct","summary":"Current confusion comes from three unrelated ideas sharing similar names. In GAD: `workspace` means registered planning roots in the CLI config; `worktree` means a git working copy (often isolated for evals, but potentially useful for normal project work too); `workstream` means a scoped execution l"},{"type":"decision","id":"decision:gad-162","label":"Retire `loop_compliance`; measure framework compliance through task attribution instead","summary":"The existing self-eval `loop_compliance` metric is just `sessions starting with snapshot / total sessions`. That measures startup ritual, not whether the framework was actually used correctly throughout the work. For GAD itself, the more honest discipline signal is whether completed tasks in TASK-RE"},{"type":"decision","id":"decision:gad-163","label":"Hydration is the framework-overhead metric: snapshot count, snapshot tokens, and hydration share of total tokens","summary":"The framework-overhead question is not \"did the session start with snapshot,\" it is \"how much context-hydration work did the framework require to keep the loop moving?\" GAD should track hydration directly: how many snapshots happened, the estimated token volume of those snapshots, and the ratio `hyd"},{"type":"decision","id":"decision:gad-164","label":"Official framework comparison matrix: bare vs GSD vs GAD vs emergent vs custom","summary":"The eval matrix should compare framework conditions cleanly. Canonical conditions are: **bare** (minimal project, no framework content), **GSD** (upstream get-shit-done framework), **GAD** (current get-anything-done framework), **emergent** (starts bare, gains agent-authored skills over time), and *"},{"type":"decision","id":"decision:gad-165","label":"Upstream GSD stays a living comparison target, not just historical inspiration","summary":"GAD is a derivative of GSD and should keep reviewing, testing, and selectively integrating upstream ideas rather than pretending the lineage is complete. The upstream mirror in `tmp/get-shit-done/` and periodic review notes are therefore not one-off research artifacts; they are part of the framework"},{"type":"decision","id":"decision:gad-166","label":"GAD is content-driven + emergent in one track â€” there is no separate \"GAD+emergent\" condition","summary":"GAD is positioned from here on as a content-driven framework whose skills evolve via the evolution loop. The earlier \"bare-vs-GAD-vs-emergent\" framing implied three separate philosophies; in practice GAD has always included baseline content (skills, agents, references) and now also includes emergent"},{"type":"decision","id":"decision:gad-167","label":"Proto-skill is a permanent skill type, not a transitional state","summary":"Any skill that was drafted by the evolution pipeline (from a candidate, via `create-proto-skill`) is permanently labeled a proto-skill, even after validation, promotion to `skills/`, or wide distribution. The label is provenance, not lifecycle stage. Rationale: when a skill starts misbehaving the fa"},{"type":"decision","id":"decision:gad-168","label":"Rename `gad-quick-skill` â†’ `create-proto-skill`; neutral upstream baseline stays untouched","summary":"`gad-quick-skill` was created as a GAD-aware wrapper around an upstream neutral skill creator, but the wrapping pulled GAD context into what was meant to be a baseline-neutral surface. The neutral baseline (dot-agent `create-skill` or similar) should remain untouched for non-GAD projects; the GAD wr"},{"type":"decision","id":"decision:gad-169","label":"Findings are articles / whitepapers â€” first-class nav item with per-slug pages","summary":"/findings is reframed from an internal scratchpad into a public articles/whitepapers surface. Each finding gets its own standalone page at /findings/[slug] so they can be linked from other site pages (LineageMeasurementSection, RunHeroCallouts, rubric hero, etc.) and shared externally without deep-a"},{"type":"decision","id":"decision:gad-170","label":"Brood Editor is local-dev-only â€” no Vercel npx execution in the first cut","summary":"The brood editor / project editor surface (phase 44.5) will assume local development for its first implementation. It may read the filesystem, trigger `npx` commands, populate eval folders, and rebuild pages via a dev-server-only bridge. We are explicitly NOT shipping a Vercel-hosted API route that "},{"type":"decision","id":"decision:gad-171","label":"`create-proto-skill` uses bulk batching with per-candidate checkpoints","summary":"When implemented, `create-proto-skill` will process all pending candidates in a single invocation rather than one-per-run. Rationale: the skill-creation context (dot-agent format rules, example skills, reference docs) is large and reloading it for every candidate wastes tokens at scale â€” at N=14 c"},{"type":"decision","id":"decision:gad-172","label":"Workflows are a first-class GAD concept â€” hand-authored expected graph, computed actual graph, diff as tuning signal","summary":"GAD already traces skills, agents, and tool calls per phase (trace v4 from phases 25 and 32). That trace data is rich enough to compute an actual \"workflow graph\" â€” the sequence of skill invocations, agent spawns, and decision points an agent traversed to complete a task â€” without any new instru"},{"type":"decision","id":"decision:gad-173","label":"Workflow validator = expected/actual diff = next `framework_compliance` metric","summary":"Three open questions about workflows (nesting, validators, self-report) resolve together because they all hinge on what a workflow validator actually IS. Answers: (a) **Workflows nest.** A workflow can declare `parent-workflow: <slug>` in frontmatter and will be rendered as a sub-graph inside its pa"},{"type":"skill","id":"skill:gad-decide","label":"gad-decide","source":"decision-citation"},{"type":"skill","id":"skill:gad-discuss-plan-execute","label":"gad-discuss-plan-execute","source":"decision-citation"},{"type":"skill","id":"skill:gad-debug","label":"gad-debug","source":"decision-citation"},{"type":"skill","id":"skill:gad-loop","label":"gad-loop","source":"decision-citation"},{"type":"decision","id":"decision:gad-174","label":"Emergent workflow detection â€” DFG + frequent subgraph mining v1, proto-workflow as first-class permanent type, three-section visualization","summary":"The trace synthesis pipeline (phase 42.3-04) must distinguish three things: (a) runs of authored workflows, (b) emergent workflows â€” recurring trace patterns nobody wrote down but that appear often enough to be real, (c) noise â€” one-off sequences that don't repeat. Four techniques considered: di"},{"type":"decision","id":"decision:gad-175","label":"Trace events are scoped by context â€” GAD-framework vs eval-agent vs brood-project â€” and the workflow detector filters by scope","summary":"The initial 42.3-04 run exposed a correctness problem: `.planning/.trace-events.jsonl` at the GAD repo root contains events from every cwd the hooks fire in, including events produced by agents working INSIDE eval worktrees (escape-the-dungeon, etc.). Those events are game-dev activity inside an eva"},{"type":"decision","id":"decision:gad-176","label":"Context framework is a first-class axis, orthogonal to tech stack â€” GAD is one of many; site treats them symmetrically","summary":"The site has been implicitly treating GAD as \"the framework\" and everything else (bare, GSD) as comparison conditions. That framing is wrong for where the site is headed. **Reframe**: a project is defined by two orthogonal axes: (a) **tech stack** â€” the software platform the work targets (kaplay, "},{"type":"decision","id":"decision:gad-177","label":"Emergent workflows have NO authored Mermaid â€” React Flow only; the live graph IS the workflow shape","summary":"Authored workflows are designed in advance; Mermaid is the right tool for their expected shape (crisp, static, diffable). Emergent workflows are detected from trace data; by definition they have no designed shape to render as an expected Mermaid graph. The synthetic Mermaid body the v1 detector was "},{"type":"decision","id":"decision:gad-178","label":"Skills determine workflows â€” tool-level mining is a v1 shortcut; skill invocation sequences are the real signal","summary":"A workflow is defined by the SKILLS used and the ORDER they're used in, not by the low-level tools those skills invoke. The v1 detector mines `tool_use` events (Bash / Read / Edit / Write / Grep etc.) because that is the only signal the current trace schema carries â€” and its top patterns are noise"},{"type":"skill","id":"skill:gad-execute-phase","label":"gad-execute-phase","source":"decision-citation"},{"type":"decision","id":"decision:gad-179","label":"Context framework is a new catalog type parallel to skills/agents/workflows/tech-stacks â€” installable as a project dependency; GAD remains framed as a framework","summary":"Confirms and extends decision gad-176. **Context framework** becomes a new catalog content type sitting alongside skills, agents, commands, workflows, and tech stacks in `catalog.generated.ts`. Each context framework is a bundle referencing existing skill/agent/workflow slugs by identifier â€” it do"},{"type":"decision","id":"decision:gad-180","label":"One canonical skill body per public skill name; wrappers and variants must not create duplicate identities in the canonical catalog","summary":"The current skill tree still contains cases where two different directories declare the same public skill identity (`name:` in frontmatter) with materially different bodies. That is a catalog bug, not healthy optionality: routing becomes ambiguous, install/catalog output becomes misleading, and huma"},{"type":"skill","id":"skill:gad:plan-phase","label":"gad:plan-phase","source":"decision-citation"},{"type":"decision","id":"decision:gad-181","label":"Command skills are `gad-*`; procedural bodies live in prefixed `gad-*` workflows; templates are scaffolds, not methods","summary":"GAD's canonical skill catalog is command-oriented. A skill answers \"what do I invoke?\" and therefore should be a concise runtime-facing contract: trigger semantics, flags, required tools, participating agent roles, and the workflow/reference files it delegates to. The long-form methodology that used"},{"type":"decision","id":"decision:gad-182","label":"Canonical framework assets need an automated integrity gate: unique public skill names and resolvable `@...` references","summary":"Manual grep passes are not enough to keep the framework surface coherent after repeated structural migrations. The canonical asset tree now has enough cross-linking (`skills/` â†’ `workflows/` / `references/` / `templates/`, agent prompts, hook docs, site catalog generation) that two failure modes n"},{"type":"decision","id":"decision:gad-183","label":"Proto-skills stage inside the owning project's `.planning/` and install outward into runtimes on demand","summary":"Proto-skills are not canonical framework assets yet; they are project-local planning artifacts awaiting human review. Policy: the canonical staging directory for proto-skills is `.planning/proto-skills/` inside the owning GAD project, not `skills/proto-skills/`. This keeps drafted proto-skills in th"},{"type":"decision","id":"decision:gad-184","label":"Project âŠ‡ Species inheritance contract: merge-at-read-time eval loader","summary":"Every eval project has one `evals/&lt;project&gt;/project.json` declaring defaults (`techStack`, `contextFramework`, `installedSkills`, `defaultContent`, domain/description/rubric metadata) and one `evals/&lt;project&gt;/species/&lt;species&gt;/species.json` per species. Species may override any pro"},{"type":"dec
