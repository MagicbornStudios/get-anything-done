ision","id":"decision:gad-185","label":"Canonical planning-root shape: minimum file set, optional set, legacy list, and audit binding","summary":"Every GAD planning root (`[[planning.roots]]` in `gad-config.toml`) has a canonical shape. The canonical MINIMUM file set that every `.planning/` directory MUST contain is four files: `STATE.xml`, `ROADMAP.xml`, `TASK-REGISTRY.xml`, `DECISIONS.xml`. This is the \"everyone can run `gad snapshot`/`stat"},{"type":"decision","id":"decision:gad-186","label":"Dev-panel copy tokens must be source-searchable literals; compact panel is the single maintained surface","summary":"The dev panel exists to let an operator identify what they are looking at and hand that exact target to another agent. Runtime-only ids with React `useId()` suffixes fail that job because they are not greppable in source. Policy: every copied dev token and every update/delete handoff prompt should p"},{"type":"decision","id":"decision:gad-187","label":"Visual Context Panel naming contract: section cid is the default identity; Identified is optional depth","summary":"Human-in-the-loop feedback from the /skeptic and /projects surfaces converged on one stable requirement: operators must be able to copy a visible identifier and grep it directly in source for fast update/delete handoff prompts. Policy: the primary section identity is an explicit literal cid on SiteS"},{"type":"skill","id":"skill:gad-visual-context-panel-identities","label":"gad-visual-context-panel-identities","source":"decision-citation"},{"type":"decision","id":"decision:gad-188","label":"44-28 umbrella: installer + release pipeline + data scoping — distribution is GitHub releases, not npm, with a Windows-first lightweight installer writing only into .planning/ and agent dirs","summary":"Discuss-phase 2026-04-14 on task 44-28 produced a 12-point decision set that reframes the original thin \"gad site install\" scope into an umbrella covering 5 sub-tasks (44-30 through 44-34). Locked: (1) NO npm publishing ever — we ship from GitHub releases of github.com/MagicbornStudios/get-anything-"},{"type":"skill","id":"skill:gad-v1","label":"gad-v1","source":"decision-citation"},{"type":"skill","id":"skill:gad-cli","label":"gad-cli","source":"decision-citation"},{"type":"decision","id":"decision:gad-189","label":"Phase 44.5 vocabulary + draft/published model: recipe / species / generation / brood / bestiary — and projects default to draft, /project-market filters to published","summary":"Discuss-phase 2026-04-15 for phase 44.5 (Brood Editor + Project Editor split) locked the vocabulary and the draft/published model before any plan-phase work starts.\r\n\r\n**Vocabulary**:\r\n- **Recipe**: reusable template that describes how to produce a species. Lives inside project data (not framework-l"},{"type":"decision","id":"decision:gad-190","label":"SKILL.md is the single command entry point; `workflow:` frontmatter key replaces `skill.json`","summary":"The canonical skill shape has drifted: some skills ship `SKILL.md`, some ship `SKILL.md + COMMAND.md + skill.json`, some ship `SKILL.md + references/`. `skill.json` is a GAD-only sidecar (upstream GSD has zero of them) with a single load-bearing field: `commandPath`, which points at the workflow fil"},{"type":"skill","id":"skill:gad-create-skill","label":"gad-create-skill","source":"decision-citation"},{"type":"skill","id":"skill:gad-merge-skill","label":"gad-merge-skill","source":"decision-citation"},{"type":"decision","id":"decision:gad-191","label":"Proto-skills are self-contained bundles at `.planning/proto-skills/&lt;slug&gt;/` with a sibling `workflow.md`","summary":"Decision gad-183 already moved proto-skill staging to `.planning/proto-skills/` and established `gad evolution install/validate/promote/discard`. This decision refines the contents of a staged proto-skill directory so it plays nicely with the new uniform skill shape (gad-190). A staged proto-skill i"},{"type":"decision","id":"decision:gad-192","label":"`gad snapshot` surfaces sprint-relevant skills via TASK-REGISTRY `skill=` attribution","summary":"`gad snapshot` today dumps STATE, ROADMAP, open tasks, and recent decisions. It does not tell the agent which skills it is most likely to reach for in the current sprint, so agents either cold-read the whole catalog (expensive) or guess (unreliable). Decision gad-18 (the GAD loop: snapshot → work → "},{"type":"decision","id":"decision:gad-195","label":"Snapshot rehydration is wasteful — session-scoped static/active split is the canonical contract","summary":"Operator confirmed 2026-04-15 (after 42.2-26 experiment was designed but before it was run): repeatedly loading the same snapshot context into an already-warm agent session is wasteful, not reinforcing. Once the agent has seen static information (skill catalog, workflow specs, decision history, refe"},{"type":"decision","id":"decision:gad-196","label":"Home band rename: `lineage` → `agent-handoff-cycle` — retrospective on stale naming","summary":"The home-page section `components/landing/lineage/` used `SiteSection` `cid=\"lineage-site-section\"` while the **product meaning** had shifted to a visual-context handoff loop (site → panel → speech → clipboard → coding agent → ship → repeat). \"Lineage\" remained accurate only for the **GSD upstream r"},{"type":"decision","id":"decision:gad-197","label":"Graphify integration: Option B (native Node extractor) ships first, Option A (vendor Graphify) gated on evidence","summary":"Task 42.2-41 trialed Graphify end-to-end via the newly-shipped `gad try` flow. Findings in `evals/FINDINGS-2026-04-15-graphify-trial.md` — pipeline proven end-to-end, 33 files staged into `.gad-try/graphify/`, consent gate correctly surfaced the implicit `pip install graphifyy` dependency via body s"},{"type":"skill","id":"skill:gad-try","label":"gad-try","source":"decision-citation"},{"type":"skill","id":"skill:gad-graphify","label":"gad-graphify","source":"decision-citation"},{"type":"skill","id":"skill:gad-planning-graph","label":"gad-planning-graph","source":"decision-citation"},{"type":"decision","id":"decision:gad-198","label":"Skills are the genes in the DNA — install/try/proto/shed/promote collapse into one lifecycle, surfaced as the DNA Editor inside the Project Editor","summary":"Operator (2026-04-15) made the biological metaphor explicit and the scattered commands suddenly line up:\r\n\r\n**Genes = skills.** A skill (SKILL.md + workflow) is the atomic hereditary unit. The project's `.claude/skills/` dir is the DNA — the permanent, integrated set of genes the organism expresses "},{"type":"decision","id":"decision:gad-199","label":"Graphify accepted as full dependency — supersedes hybrid approach (gad-197)","summary":"Accept Graphify (Python) as the real graph backend, not just a trial. Three deliverables: (1) full install (not gad-try), (2) `gad query` CLI command for token-efficient graph lookups, (3) `gad graph` to regenerate. The installer (bin/install.js) packages or helps install Python/pip for consumers. S"},{"type":"decision","id":"decision:gad-201","label":"Graph query is the default lookup mechanism for all GAD projects","summary":"Graph queries (gad query, gad tasks --graph, gad state --graph) are the default for targeted planning lookups across all GAD projects. 12.9x token savings (1770 tokens raw vs 137 tokens graph query). ~320ms rebuild, zero external deps. Auto-rebuild hooks on task claim/release and state set-next-acti"},{"type":"decision","id":"decision:gad-200","label":"Post-shed cleanup pass: review code touched by shed skills, remove dead code, re-graphify","summary":"After any evolution shed cycle, the codebase must be reviewed for dead code left behind by the shed skills. Run Graphify to regenerate the graph post-shed, then query for orphaned references. This is a mandatory step in the evolution lifecycle, not optional cleanup."},{"type":"decision","id":"decision:gad-202","label":"All GAD workflows prefer `gad query` over raw XML reads for targeted lookups","summary":"All GAD skill and workflow instructions now prefer `gad query` over raw XML reads when `useGraphQuery=true` is set in gad-config.toml. Skills updated: gad-plan-phase (query decisions/tasks before planning), gad-execute-phase (query planned tasks in phase), gad-verify-work (query done tasks in phase)"},{"type":"skill","id":"skill:gad-plan-phase","label":"gad-plan-phase","source":"decision-citation"},{"type":"skill","id":"skill:gad-verify-work","label":"gad-verify-work","source":"decision-citation"},{"type":"skill","id":"skill:gad-check-todos","label":"gad-check-todos","source":"decision-citation"},{"type":"workflow","id":"workflow:./workflow.md","label":"./workflow.md","source":"skill-ref"},{"type":"skill","id":"skill:eval-skill-install","label":">-","slug":"eval-skill-install","trigger":"","source":"canonical"},{"type":"skill","id":"skill:find-skills","label":">-","slug":"find-skills","trigger":"","source":"canonical"},{"type":"skill","id":"skill:find-sprites","label":"Source visual assets (sprites, icons, tilesets, portraits) for a game or UI-heavy build in a way that yields a coherent, intentional look instead of a debug-console aesthetic. Use this skill when you need art for rooms, entities, UI controls, HP bars, spell icons, status effects, or any other visual element; when the build is failing its UI-quality gate because it looks unintentional; or when you're about to fall back to raw ASCII/text UI. The goal is \"looks like someone designed it\" — not photorealism, not 1:1 with AAA games, but internally consistent and readable.","slug":"find-sprites","trigger":"","source":"canonical"},{"type":"skill","id":"skill:gad:add-backlog","label":"Add an idea to the backlog parking lot (999.x numbering)","slug":"gad-add-backlog","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/add-backlog.md","label":"workflows/add-backlog.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:add-phase","label":"Add phase to end of current milestone in roadmap","slug":"gad-add-phase","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/add-phase.md","label":"workflows/add-phase.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:add-tests","label":"Generate tests for a completed phase based on UAT criteria and implementation","slug":"gad-add-tests","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/add-tests.md","label":"workflows/add-tests.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:add-todo","label":"Capture idea or task as todo from current conversation context","slug":"gad-add-todo","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/add-todo.md","label":"workflows/add-todo.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:audit-milestone","label":"Audit milestone completion against original intent before archiving","slug":"gad-audit-milestone","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/audit-milestone.md","label":"workflows/audit-milestone.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:audit-uat","label":"Cross-phase audit of all outstanding UAT and verification items","slug":"gad-audit-uat","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/audit-uat.md","label":"workflows/audit-uat.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:auto-conventions","label":"Auto-scaffold CONVENTIONS.md from codebase patterns after first implementation phase","slug":"gad-auto-conventions","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/auto-conventions.md","label":"workflows/auto-conventions.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:autonomous","label":"Run all remaining phases autonomously — discuss→plan→execute per phase","slug":"gad-autonomous","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/autonomous.md","label":"workflows/autonomous.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:check-todos","label":"List pending todos and select one to work on","slug":"gad-check-todos","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/check-todos.md","label":"workflows/check-todos.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:cleanup","label":"Archive accumulated phase directories from completed milestones","slug":"gad-cleanup","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/cleanup.md","label":"workflows/cleanup.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:complete-milestone","label":"Archive completed milestone and prepare for next version","slug":"gad-complete-milestone","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/complete-milestone.md","label":"workflows/complete-milestone.md","source":"skill-ref"},{"type":"skill","id":"skill:gad-cross-config-domain-change","label":">-","slug":"gad-cross-config-domain-change","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/cross-config-domain-change.md","label":"workflows/cross-config-domain-change.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:debug","label":"Systematic debugging with persistent state across context resets","slug":"gad-debug","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/gad-debug.md","label":"workflows/gad-debug.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:discovery-test","label":">-","slug":"gad-discovery-test","trigger":"","source":"canonical"},{"type":"workflow","id":"workflow:workflows/discovery-test.md","label":"workflows/discovery-test.md","source":"skill-ref"},{"type":"skill","id":"skill:gad:discuss-phase","label":"Gather phase context through adaptive questioning before planning. Use --auto to skip interactive questions (Claude picks recommended defaults). Use --chain for interactive discuss followed by automatic p ows/stats.md","type":"USES_WORKFLOW"},{"source":"skill:gad:task-checkpoint","target":"workflow:workflows/task-checkpoint.md","type":"USES_WORKFLOW"},{"source":"skill:gad:thread","target":"workflow:workflows/thread.md","type":"USES_WORKFLOW"},{"source":"skill:gad:update","target":"workflow:workflows/update.md","type":"USES_WORKFLOW"},{"source":"skill:gad:validate-phase","target":"workflow:workflows/validate-phase.md","type":"USES_WORKFLOW"},{"source":"skill:gad:verify-phase","target":"workflow:workflows/verify-phase.md","type":"USES_WORKFLOW"},{"source":"skill:gad:verify-work","target":"workflow:workflows/verify-work.md","type":"USES_WORKFLOW"},{"source":"skill:gad-visual-context-panel-identities","target":"workflow:workflows/visual-context-panel-identities.md","type":"USES_WORKFLOW"},{"source":"skill:gad-visual-context-system","target":"workflow:workflows/visual-context-system.md","type":"USES_WORKFLOW"},{"source":"skill:gad:workspace-add","target":"workflow:workflows/workspace-add.md","type":"USES_WORKFLOW"},{"source":"skill:gad:workspace-show","target":"workflow:workflows/workspace-show.md","type":"USES_WORKFLOW"},{"source":"skill:gad:workspace-sync","target":"workflow:workflows/workspace-sync.md","type":"USES_WORKFLOW"},{"source":"skill:gad:write-feature-doc","target":"workflow:workflows/write-feature-doc.md","type":"USES_WORKFLOW"},{"source":"skill:gad:write-intent","target":"workflow:workflows/write-intent.md","type":"USES_WORKFLOW"},{"source":"skill:gad:write-tech-doc","target":"workflow:workflows/write-tech-doc.md","type":"USES_WORKFLOW"},{"source":"skill:scaffold-visual-context-surface","target":"workflow:workflows/scaffold-visual-context-surface.md","type":"USES_WORKFLOW"}]};
const COLORS = { phase: '#4ade80', task: '#60a5fa', decision: '#fbbf24', skill: '#c084fc', workflow: '#2dd4bf', file: '#94a3b8' };
const SIZES = { phase: 10, task: 6, decision: 8, skill: 7, workflow: 5, file: 4 };

// Simple force-directed layout
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = canvas.clientWidth; H = canvas.height = canvas.clientHeight; }
resize();
window.addEventListener('resize', resize);

// Init positions
const pos = {};
GRAPH.nodes.forEach((n, i) => {
  const angle = (i / GRAPH.nodes.length) * Math.PI * 2;
  const r = Math.min(W, H) * 0.35;
  pos[n.id] = { x: W/2 + Math.cos(angle) * r + (Math.random() - 0.5) * 50, y: H/2 + Math.sin(angle) * r + (Math.random() - 0.5) * 50, vx: 0, vy: 0 };
});

const edgeIndex = {};
GRAPH.edges.forEach(e => {
  if (!edgeIndex[e.source]) edgeIndex[e.source] = [];
  if (!edgeIndex[e.target]) edgeIndex[e.target] = [];
  edgeIndex[e.source].push(e);
  edgeIndex[e.target].push(e);
});

let activeType = 'all';
let searchTerm = '';
let selectedNode = null;

function isVisible(n) {
  if (activeType !== 'all' && n.type !== activeType) return false;
  if (searchTerm && !(`${n.id} ${n.label}`).toLowerCase().includes(searchTerm)) return false;
  return true;
}

function simulate() {
  const visible = GRAPH.nodes.filter(isVisible);
  const visIds = new Set(visible.map(n => n.id));
  // Repulsion
  for (let i = 0; i < visible.length; i++) {
    for (let j = i + 1; j < visible.length; j++) {
      const a = pos[visible[i].id], b = pos[visible[j].id];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d = Math.sqrt(dx*dx + dy*dy) || 1;
      let f = 800 / (d * d);
      a.vx += dx/d * f; a.vy += dy/d * f;
      b.vx -= dx/d * f; b.vy -= dy/d * f;
    }
  }
  // Attraction (edges)
  GRAPH.edges.forEach(e => {
    if (!visIds.has(e.source) || !visIds.has(e.target)) return;
    const a = pos[e.source], b = pos[e.target];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx*dx + dy*dy) || 1;
    let f = (d - 100) * 0.01;
    a.vx += dx/d * f; a.vy += dy/d * f;
    b.vx -= dx/d * f; b.vy -= dy/d * f;
  });
  // Center gravity
  visible.forEach(n => {
    const p = pos[n.id];
    p.vx += (W/2 - p.x) * 0.001;
    p.vy += (H/2 - p.y) * 0.001;
    p.vx *= 0.9; p.vy *= 0.9;
    p.x += p.vx; p.y += p.vy;
    p.x = Math.max(20, Math.min(W-20, p.x));
    p.y = Math.max(20, Math.min(H-20, p.y));
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const visible = GRAPH.nodes.filter(isVisible);
  const visIds = new Set(visible.map(n => n.id));
  // Edges
  GRAPH.edges.forEach(e => {
    if (!visIds.has(e.source) || !visIds.has(e.target)) return;
    const a = pos[e.source], b = pos[e.target];
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(100,100,100,0.3)';
    ctx.stroke();
  });
  // Nodes
  visible.forEach(n => {
    const p = pos[n.id];
    const r = SIZES[n.type] || 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = n === selectedNode ? '#fff' : (COLORS[n.type] || '#888');
    ctx.fill();
  });
}

function loop() { simulate(); draw(); requestAnimationFrame(loop); }
loop();

// Interaction
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
  });
});
document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value.toLowerCase(); });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const visible = GRAPH.nodes.filter(isVisible);
  let closest = null, closestDist = 20;
  visible.forEach(n => {
    const p = pos[n.id];
    const d = Math.sqrt((p.x - mx)**2 + (p.y - my)**2);
    if (d < closestDist) { closest = n; closestDist = d; }
  });
  selectedNode = closest;
  const info = document.getElementById('info');
  if (!closest) { info.style.display = 'none'; return; }
  const nodeEdges = (edgeIndex[closest.id] || []);
  info.style.display = 'block';
  info.innerHTML = `
    <h3><span class="type-badge type-${closest.type}">${closest.type}</span> ${closest.id}</h3>
    <div class="field"><div class="field-label">Label</div>${closest.label}</div>
    ${closest.status ? `<div class="field"><div class="field-label">Status</div>${closest.status}</div>` : ''}
    ${closest.goal ? `<div class="field"><div class="field-label">Goal</div>${closest.goal.slice(0, 200)}</div>` : ''}
    ${closest.skill ? `<div class="field"><div class="field-label">Skill</div>${closest.skill}</div>` : ''}
    <div class="edges"><div class="field-label">Edges (${nodeEdges.length})</div>
    ${nodeEdges.slice(0, 20).map(e => `<div class="edge-item">${e.type}: ${e.source === closest.id ? e.target : e.source}</div>`).join('')}
    ${nodeEdges.length > 20 ? `<div class="edge-item">... and ${nodeEdges.length - 20} more</div>` : ''}
    </div>
  `;
});
</script>
