name: Release Posix Builds

on:
  push:
    branches:
      - main
    paths:
      - '.agents/skills/**'
      - '.github/workflows/release-posix.yml'
      - 'CHANGELOG.md'
      - 'agents/**'
      - 'bin/**'
      - 'commands/**'
      - 'hooks/**'
      - 'lib/**'
      - 'package-lock.json'
      - 'package.json'
      - 'references/**'
      - 'scripts/build-*'
      - 'scripts/install-gad-*'
      - 'scripts/publish-release.mjs'
      - 'scripts/release-*'
      - 'scripts/sea-*'
      - 'templates/**'
      - 'workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifact
        run: npm run build:release

      - name: Upload release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874
        with:
          name: gad-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/release/gad-v*
            dist/release/INSTALL.txt
